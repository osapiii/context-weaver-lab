<svg viewBox="0 0 700 480" xmlns="http://www.w3.org/2000/svg" role="img"
     font-family="'Noto Sans JP', sans-serif">
  <title>データパイプライン (IoT → Kafka → Spark → BigQuery → Dashboard)</title>
  <desc>cloudDesign 流の SVG 制約セットで描いた典型的なデータ基盤の構成図</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#B45309"/>
    </marker>
  </defs>

  <!-- 背景 (canvas、色数カウント外) -->
  <rect width="700" height="480" fill="#FAFAF7"/>

  <!-- ノード1: IoT センサー (アンテナ波で「発信」を表現) -->
  <g>
    <path d="M 50 95 L 110 95 Q 122 95 122 107 L 122 185 Q 122 197 110 197 L 50 197 Q 38 197 38 185 L 38 107 Q 38 95 50 95 Z"
          fill="none" stroke="#1F2937" stroke-width="2"/>
    <line x1="65" y1="106" x2="95" y2="106" stroke="#1F2937" stroke-width="2"/>
    <path d="M 58 130 Q 80 120 102 130" fill="none" stroke="#F59E0B" stroke-width="2"/>
    <path d="M 62 138 Q 80 132 98 138" fill="none" stroke="#F59E0B" stroke-width="2"/>
    <circle cx="80" cy="150" r="3" fill="#F59E0B"/>
    <text x="80" y="175" font-size="11" font-weight="700" fill="#1F2937" text-anchor="middle">IoT</text>
    <text x="80" y="220" font-size="10" fill="#6B7280" text-anchor="middle"
          font-family="'JetBrains Mono', monospace">100 devices</text>
  </g>

  <!-- ノード2: Kafka (並んだ箱 = キュー) -->
  <g>
    <rect x="155" y="95" width="125" height="100" fill="none" stroke="#1F2937" stroke-width="2"/>
    <rect x="168" y="128" width="14" height="34" fill="#F59E0B"/>
    <rect x="188" y="128" width="14" height="34" fill="#F59E0B"/>
    <rect x="208" y="128" width="14" height="34" fill="#F59E0B"/>
    <rect x="228" y="128" width="14" height="34" fill="#FAFAF7" stroke="#1F2937" stroke-width="2" stroke-dasharray="4 4"/>
    <rect x="248" y="128" width="14" height="34" fill="#FAFAF7" stroke="#1F2937" stroke-width="2" stroke-dasharray="4 4"/>
    <text x="217" y="185" font-size="11" font-weight="700" fill="#1F2937" text-anchor="middle">Kafka</text>
    <text x="217" y="220" font-size="10" fill="#6B7280" text-anchor="middle"
          font-family="'JetBrains Mono', monospace">100k msg/s</text>
  </g>

  <!-- ノード3: Spark (歯車 = 処理) -->
  <g>
    <rect x="305" y="95" width="115" height="100" fill="none" stroke="#1F2937" stroke-width="2"/>
    <g transform="translate(362, 145)">
      <circle r="22" fill="none" stroke="#F59E0B" stroke-width="3"/>
      <circle r="8" fill="#F59E0B"/>
      <line x1="0" y1="-28" x2="0" y2="-20" stroke="#F59E0B" stroke-width="3"/>
      <line x1="0" y1="20" x2="0" y2="28" stroke="#F59E0B" stroke-width="3"/>
      <line x1="-28" y1="0" x2="-20" y2="0" stroke="#F59E0B" stroke-width="3"/>
      <line x1="20" y1="0" x2="28" y2="0" stroke="#F59E0B" stroke-width="3"/>
      <line x1="-20" y1="-20" x2="-14" y2="-14" stroke="#F59E0B" stroke-width="3"/>
      <line x1="14" y1="14" x2="20" y2="20" stroke="#F59E0B" stroke-width="3"/>
      <line x1="-20" y1="20" x2="-14" y2="14" stroke="#F59E0B" stroke-width="3"/>
      <line x1="14" y1="-14" x2="20" y2="-20" stroke="#F59E0B" stroke-width="3"/>
    </g>
    <text x="362" y="185" font-size="11" font-weight="700" fill="#1F2937" text-anchor="middle">Spark</text>
    <text x="362" y="220" font-size="10" fill="#6B7280" text-anchor="middle"
          font-family="'JetBrains Mono', monospace">batch + stream</text>
  </g>

  <!-- ノード4: BigQuery (円筒 = DB) -->
  <g>
    <path d="M 445 110 L 445 185 Q 445 200 490 200 Q 535 200 535 185 L 535 110"
          fill="none" stroke="#1F2937" stroke-width="2"/>
    <ellipse cx="490" cy="110" rx="45" ry="12" fill="#F59E0B" stroke="#1F2937" stroke-width="2"/>
    <path d="M 445 135 Q 490 148 535 135" fill="none" stroke="#1F2937"
          stroke-width="2" stroke-dasharray="4 4"/>
    <path d="M 445 160 Q 490 173 535 160" fill="none" stroke="#1F2937"
          stroke-width="2" stroke-dasharray="4 4"/>
    <text x="490" y="185" font-size="11" font-weight="700" fill="#1F2937" text-anchor="middle">BigQuery</text>
    <text x="490" y="220" font-size="10" fill="#6B7280" text-anchor="middle"
          font-family="'JetBrains Mono', monospace">PB scale</text>
  </g>

  <!-- 矢印: marker 1 種を使い回す -->
  <line x1="122" y1="145" x2="150" y2="145" stroke="#B45309" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="280" y1="145" x2="300" y2="145" stroke="#B45309" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="420" y1="145" x2="443" y2="145" stroke="#B45309" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 下段: ダッシュボード (内側に折れ線グラフ) -->
  <g>
    <rect x="225" y="310" width="200" height="120" fill="none" stroke="#1F2937" stroke-width="2"/>
    <line x1="225" y1="330" x2="425" y2="330" stroke="#1F2937" stroke-width="2"/>
    <path d="M 245 410 L 275 390 L 305 395 L 335 365 L 365 375 L 395 350 L 415 340"
          fill="none" stroke="#F59E0B" stroke-width="3"/>
    <polygon points="415,340 411,350 419,350" fill="#F59E0B"/>
    <text x="325" y="455" font-size="11" font-weight="700" fill="#1F2937" text-anchor="middle">Dashboard</text>
  </g>

  <!-- 下向き矢印 BigQuery → Dashboard -->
  <line x1="490" y1="220" x2="490" y2="280" stroke="#B45309" stroke-width="2"/>
  <line x1="490" y1="280" x2="325" y2="280" stroke="#B45309" stroke-width="2"/>
  <line x1="325" y1="280" x2="325" y2="305" stroke="#B45309" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
