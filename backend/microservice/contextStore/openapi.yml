                  summary: 正常レスポンス
                  value:
                    status: "healthy"

components:
  schemas:
    CreateStoreRequest:
      type: object
      required: [requestId, input, operationMetadata]
      properties:
        requestId:
          type: string
          description: リクエスト識別子
          example: "req_123456"
        input:
          $ref: "#/components/schemas/CreateStoreInput"
        operationMetadata:
          $ref: "#/components/schemas/StandardOperationMetadata"

    CreateStoreInput:
      type: object
      properties:
        displayName:
          type: string
          description: FileSearchStoreの表示名
          example: "My File Search Store"

    UploadFileRequest:
      type: object
      required: [requestId, input, operationMetadata]
      properties:
        requestId:
          type: string
          description: リクエスト識別子
          example: "req_123456"
        input:
          $ref: "#/components/schemas/UploadFileInput"
        operationMetadata:
          $ref: "#/components/schemas/StandardOperationMetadata"

    UploadFileInput:
      type: object
      required: [bucketName, filePath]
      properties:
        bucketName:
          type: string
          description: GCSバケット名
          example: "my-bucket"
        filePath:
          type: string
          description: GCS内のファイルパス（バケット名を除く）。ファイル名はこのパスから自動的に取得されます。
          example: "path/to/file.pdf"
        customMetadata:
          type: array
          description: カスタムメタデータ（key-value形式の配列）
          items:
            type: object
            properties:
              key:
                type: string
                description: メタデータのキー
                example: "project"
              value:
                type: string
                description: メタデータの値
                example: "project-a"
          example:
            - key: "project"
              value: "project-a"
            - key: "environment"
              value: "production"
        mimeType:
          type: string
          description: "ファイルのMIMEタイプ（例: application/pdf, image/jpeg等）"
          example: "application/pdf"

    GetStoreRequest:
      type: object
      required: [requestId, input, operationMetadata]
      properties:
        requestId:
          type: string
          description: リクエスト識別子（リクエストボディがない場合は自動生成）
          example: "req_123456"
        input:
          $ref: "#/components/schemas/GetStoreInput"
        operationMetadata:
          $ref: "#/components/schemas/StandardOperationMetadata"

    GetStoreInput:
      type: object
      description: FileSearchStore取得の入力パラメータ（パスパラメータのみ使用）
      properties: {}

    ListStoresRequest:
      type: object
      required: [requestId, input, operationMetadata]
      properties:
        requestId:
          type: string
          description: リクエスト識別子（リクエストボディがない場合は自動生成）
          example: "req_123456"
        input:
          $ref: "#/components/schemas/ListStoresInput"
        operationMetadata:
          $ref: "#/components/schemas/StandardOperationMetadata"

    ListStoresInput:
      type: object
      description: FileSearchStore一覧取得の入力パラメータ（パラメータなし）
      properties: {}

    DeleteStoreRequest:
      type: object
      required: [requestId, input, operationMetadata]
      properties:
        requestId:
          type: string
          description: リクエスト識別子
          example: "req_123456"
        input:
          $ref: "#/components/schemas/DeleteStoreInput"
        operationMetadata:
          $ref: "#/components/schemas/StandardOperationMetadata"

    DeleteStoreInput:
      type: object
      properties:
        force:
          type: boolean
          description: "強制削除フラグ（デフォルト: true）"
          example: true

    ListDocumentsRequest:
      type: object
      required: [requestId, input, operationMetadata]
      properties:
        requestId:
          type: string
          description: リクエスト識別子（リクエストボディに含まれていない場合は自動生成）
          example: "req_123456"
        input:
          $ref: "#/components/schemas/ListDocumentsInput"
        operationMetadata:
          $ref: "#/components/schemas/StandardOperationMetadata"

    ListDocumentsInput:
      type: object
      description: Document一覧取得の入力パラメータ（パラメータなし）
      properties: {}

    GetDocumentRequest:
      type: object
      required: [requestId, input, operationMetadata]
      properties:
        requestId:
          type: string
          description: リクエスト識別子（リクエストボディに含まれていない場合は自動生成）
          example: "req_123456"
        input:
          $ref: "#/components/schemas/GetDocumentInput"
        operationMetadata:
          $ref: "#/components/schemas/StandardOperationMetadata"

    GetDocumentInput:
      type: object
      description: Document取得の入力パラメータ（パスパラメータのみ使用）
      properties: {}

    DeleteDocumentRequest:
      type: object
      required: [requestId, input, operationMetadata]
      properties:
        requestId:
          type: string
          description: リクエスト識別子
          example: "req_123456"
        input:
          $ref: "#/components/schemas/DeleteDocumentInput"
        operationMetadata:
          $ref: "#/components/schemas/StandardOperationMetadata"

    DeleteDocumentInput:
      type: object
      description: Document削除の入力パラメータ
      properties:
        force:
          type: boolean
          description: "強制削除フラグ（デフォルト: true）。trueに設定すると、このDocumentに関連するChunkとオブジェクトも削除されます。"
          default: true
          example: true

    StandardOperationMetadata:
      type: object
      required: [organizationId, spaceId, requestedBy]
      description: 標準操作メタデータ（RequestDoc標準構造準拠）
      properties:
        organizationId:
          type: string
          description: Organization ID（テナント分離）
          example: "org_123"
        spaceId:
          type: string
          description: Space ID（組織内のワークスペース分離）
          example: "space_456"
        requestedBy:
          $ref: "#/components/schemas/RequestedBy"

    RequestedBy:
      type: object
      required: [email]
      description: リクエスト実行者情報
      properties:
        userId:
          type: string
          description: ユーザー識別子
          example: "user_123"
          nullable: true
        email:
          type: string
          description: ユーザーのメールアドレス
          example: "user@example.com"
        role:
          type: integer
          description: ユーザーロール（1=Super Admin, 2=Admin, 3=User）
          minimum: 1
          maximum: 3
          example: 1

    SuccessResponse:
      type: object
      required: [status, requestId, output]
      description: 成功レスポンス（統一フォーマット）
      properties:
        status:
          type: string
          enum: [success]
          example: "success"
        requestId:
          type: string
          description: リクエスト識別子
          example: "req_123456"
        output:
          type: object
          description: エンドポイント固有の出力データ（camelCase形式）
          additionalProperties: true

    ErrorResponse:
      type: object
      required: [status, error]
      description: エラーレスポンス（統一フォーマット）
      properties:
        status:
          type: string
          enum: [error]
          example: "error"
        requestId:
          type: string
          description: リクエスト識別子（バリデーションエラーの場合はnullの可能性あり）
          example: "req_123456"
          nullable: true
        error:
          type: object
          required: [type, message]
          properties:
            type:
              type: string
              description: エラータイプ（ValidationError, StepExecutionError, InternalError等）
              example: "ValidationError"
            message:
              type: string
              description: エラーメッセージ
              example: "Request validation failed"
            details:
              type: object
              description: 追加のエラー詳細情報
              additionalProperties: true
              properties:
                endpoint:
                  type: string
                  description: エラーが発生したエンドポイント
                  example: "/file-search-store/create"
                validationErrors:
                  type: array
                  description: バリデーションエラーの詳細（バリデーションエラーの場合）
                  items:
                    type: object
                    properties:
                      field:
                        type: string
                        example: "operationMetadata.organizationId"
                      message:
                        type: string
                        example: "field required"
                      type:
                        type: string
                        example: "value_error.missing"
