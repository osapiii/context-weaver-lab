        1. リクエストのバリデーション
        2. Gemini File Search APIからFileSearchStore情報を取得
        3. Store情報を返却

      operationId: getFileSearchStore
      parameters:
        - name: storeId
          in: path
          required: true
          description: FileSearchStoreのID（パスから`file_search_stores/`プレフィックスを除いた部分）
          schema:
            type: string
            example: "abc123"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GetStoreRequest"
            examples:
              basic:
                summary: 基本的な使用例
                value:
                  requestId: "req_123456"
                  input:
                    force: true
                  operationMetadata:
                    organizationId: "org_123"
                    spaceId: "space_456"
                    requestedBy:
                      email: "user@example.com"
                      role: 1
      responses:
        "200":
          description: FileSearchStore情報取得成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              examples:
                success:
                  summary: 取得成功レスポンス
                  value:
                    status: "success"
                    requestId: "req_123456"
                    output:
                      name: "file_search_stores/abc123"
                      displayName: "My File Search Store"
                      createTime: "2025-11-25T14:30:00Z"
                      fileCount: 5
        "400":
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: サーバー内部エラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      tags: [file-search-store]
      summary: FileSearchStore削除
      description: |
        指定されたFileSearchStoreを削除します。

        ## 処理フロー
        1. リクエストのバリデーション
        2. Gemini File Search APIを使用してFileSearchStoreを削除
        3. 削除結果を返却

      operationId: deleteFileSearchStore
      parameters:
        - name: storeId
          in: path
          required: true
          description: FileSearchStoreのID（パスから`file_search_stores/`プレフィックスを除いた部分）
          schema:
            type: string
            example: "abc123"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteStoreRequest"
            examples:
              basic:
                summary: 基本的な使用例
                value:
                  requestId: "req_123456"
                  input:
                    force: true
                  operationMetadata:
                    organizationId: "org_123"
                    spaceId: "space_456"
