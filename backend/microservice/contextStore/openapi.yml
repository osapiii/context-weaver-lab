openapi: 3.0.3
info:
  title: Gemini File Search API
  version: 1.0.0
  description: |
    Gemini File Search APIを操作する統一マイクロサービスアーキテクチャ準拠のFastAPIアプリケーション

    ## 主な機能
    - FileSearchStoreの作成
    - ファイルのFileSearchStoreへのアップロード
    - FileSearchStore情報の取得

    ## RequestDoc標準構造
    すべてのエンドポイントはRequestDoc標準構造に準拠しています：
    - `requestId`: リクエスト識別子
    - `input`: エンドポイント固有の入力パラメータ
    - `operationMetadata`: 操作メタデータ（organizationId, spaceId, requestedBy）

servers:
  - url: https://gemini-file-search-781544707153.us-central1.run.app
    description: Cloud Run本番環境（en-aistudio-development）

tags:
  - name: file-search-store
    description: FileSearchStore操作
  - name: system
    description: システム管理

paths:
  /file-search-store/create:
    post:
      tags: [file-search-store]
      summary: FileSearchStore作成
      description: |
        Gemini File Search用のFileSearchStoreを作成します。

        ## 処理フロー
        1. リクエストのバリデーション
        2. Gemini File Search APIを使用してFileSearchStoreを作成
        3. 作成されたStore情報を返却

      operationId: createFileSearchStore
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStoreRequest"
            examples:
              basic:
                summary: 基本的な使用例
                value:
                  requestId: "req_123456"
                  input:
                    displayName: "My File Search Store"
                  operationMetadata:
                    organizationId: "org_123"
                    spaceId: "space_456"
                    requestedBy:
                      email: "user@example.com"
                      role: 1
              minimal:
                summary: 最小限のパラメータ
                value:
                  requestId: "req_789012"
                  input: {}
                  operationMetadata:
                    organizationId: "org_123"
                    spaceId: "space_456"
                    requestedBy:
                      email: "user@example.com"
      responses:
        "200":
          description: FileSearchStore作成成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              examples:
                success:
                  summary: 作成成功レスポンス
                  value:
                    status: "success"
                    requestId: "req_123456"
                    output:
                      name: "file_search_stores/abc123"
                      displayName: "My File Search Store"
                      createTime: "2025-11-25T14:30:00Z"
        "400":
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                validation_error:
                  summary: バリデーションエラー例
                  value:
                    status: "error"
                    requestId: "req_123456"
                    error:
                      type: "ValidationError"
                      message: "Request validation failed"
                      details:
                        endpoint: "/file-search-store/create"
                        validationErrors:
                          - field: "operationMetadata.organizationId"
                            message: "field required"
                            type: "value_error.missing"
        "500":
          description: サーバー内部エラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /file-search-store/{storeId}/upload:
    post:
      tags: [file-search-store]
      summary: ファイルアップロード
      description: |
        指定されたFileSearchStoreにファイルをアップロードします。

        ## 処理フロー
        1. リクエストのバリデーション
        2. GCSからファイルを取得（bucketNameとfilePathを使用）
        3. Gemini File Search APIを使用してファイルをアップロード（customMetadataとmimeTypeを含む）
        4. アップロード操作情報（Operationオブジェクト）を返却

      operationId: uploadFileToStore
      parameters:
        - name: storeId
          in: path
          required: true
          description: FileSearchStoreのID（パスから`file_search_stores/`プレフィックスを除いた部分）
          schema:
            type: string
            example: "abc123"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadFileRequest"
            examples:
              basic:
                summary: 基本的な使用例
                value:
                  requestId: "req_123456"
                  input:
                    bucketName: "my-bucket"
                    filePath: "path/to/file.pdf"
                    customMetadata:
                      - key: "project"
                        value: "project-a"
                      - key: "environment"
                        value: "production"
                    mimeType: "application/pdf"
                  operationMetadata:
                    organizationId: "org_123"
                    spaceId: "space_456"
                    requestedBy:
                      email: "user@example.com"
                      role: 1
      responses:
        "200":
          description: ファイルアップロード操作開始成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              examples:
                success:
                  summary: アップロード開始成功レスポンス（Operationオブジェクト）
                  value:
                    status: "success"
                    requestId: "req_123456"
                    output:
                      statusCode: 200
                      response:
                        name: "operations/upload_789"
                        done: false
                        metadata:
                          "@type": "type.googleapis.com/google.cloud.generativelanguage.v1beta.UploadFileSearchStoreMetadata"
        "400":
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: サーバー内部エラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /file-search-store:
    post:
      tags: [file-search-store]
      summary: FileSearchStore一覧取得
      description: |
        すべてのFileSearchStoreの一覧を取得します。

        ## 処理フロー
        1. リクエストのバリデーション
        2. Gemini File Search APIからFileSearchStore一覧を取得
        3. Store一覧を返却

        Note: RequestDoc標準構造を使用します。リクエストボディからrequest_idとoperation_metadataを取得します。

      operationId: listFileSearchStores
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ListStoresRequest"
            examples:
              basic:
                summary: 基本的な使用例
                value:
                  requestId: "req_123456"
                  input:
                    force: true
                  operationMetadata:
                    organizationId: "org_123"
                    spaceId: "space_456"
                    requestedBy:
                      email: "user@example.com"
                      role: 1
      responses:
        "200":
          description: FileSearchStore一覧取得成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              examples:
                success:
                  summary: 取得成功レスポンス
                  value:
                    status: "success"
                    requestId: "req_123456"
                    output:
                      stores:
                        - name: "file_search_stores/abc123"
                          displayName: "My File Search Store 1"
                          createTime: "2025-11-25T14:30:00Z"
                        - name: "file_search_stores/def456"
                          displayName: "My File Search Store 2"
                          createTime: "2025-11-25T15:00:00Z"
        "400":
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: サーバー内部エラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

