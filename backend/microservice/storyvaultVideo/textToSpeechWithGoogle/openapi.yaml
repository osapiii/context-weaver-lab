openapi: 3.0.3
info:
  title: Gemini Text-to-Speech API
  version: 2.0.0
  description: |
    Gemini AIを使用したテキスト読み上げマイクロサービス

    このAPIは、テキストから高品質な音声を生成し、
    Google Cloud Storageに保存します。

    ## アーキテクチャ準拠
    - RequestDoc黄金テンプレート準拠（request_id, input, systemMetadata構造）
    - ResponseFormatter統一レスポンス形式（status, request_id, result/error）

    ## 主な機能
    - テキストから音声への変換（Gemini TTS）
    - 複数の音声モデル選択
    - 音声ファイルのGCS保存
    - 音声リスト取得
    - リアルタイム処理

  contact:
    name: StoryVault Development Team
    url: https://github.com/ENOSTECH-inc/storyvault
  license:
    name: Proprietary

servers:
  - url: http://localhost:8080
    description: ローカル開発環境
  - url: https://text-to-speech-with-google-328416367800.asia-northeast1.run.app
    description: Cloud Run本番環境

tags:
  - name: synthesis
    description: 音声合成関連のエンドポイント
  - name: voices
    description: 音声モデル管理
  - name: system
    description: システム管理関連のエンドポイント

paths:
  /synthesize:
    post:
      tags:
        - synthesis
      summary: テキストから音声を生成（RequestDoc黄金テンプレート準拠）
      description: |
        指定されたテキストをGemini TTSで音声に変換し、GCSに保存します。

        ## RequestDoc黄金テンプレート準拠
        - request_id: Firebase Background関数で生成されたリクエストID
        - input: 入力パラメータ（Command）
        - systemMetadata: システムメタデータ（組織ID、ログ設定など）

        ## 処理フロー
        1. リクエスト検証（Pydantic）
        2. Step 1: 音声生成（Gemini TTS）
        3. Step 2: GCSアップロード

        ## 利用可能な音声
        - **Zephyr**: 明瞭で自然な男性音声
        - **Puck**: 活発で親しみやすい音声
        - **Charon**: 落ち着いた深みのある男性音声
        - **Aoede**: 優しく聞き取りやすい女性音声
        - **Fenrir**: 力強く説得力のある男性音声
        - **Kore**: 明るく親しみやすい女性音声
        - **Perse**: プロフェッショナルで洗練された女性音声

      operationId: synthesizeSpeech
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SynthesizeRequest"
            examples:
              basic:
                summary: 基本的な使用例（RequestDoc形式）
                value:
                  request_id: ttsRequest_1234567890
                  input:
                    text: 原宿さんは歴史にしろ人生にしろ地続きのものが好きだから「カウントダウンでリセットする」のが合わないのかな　聞いてる限り正月自体より「年の瀬の唐突な終わらせに来てる感」が嫌そう
                    voiceName: Aoede
                    outputBucketName: storyvault-sandbox
                    outputFilePath: textToSpeechWithGoogleTest/output.wav
                    projectId: project_123
                  systemMetadata:
                    organizationId: ryAAh2lQ8uu8MU6zfzIE
                    spaceId: space_456
                    loggingCollectionId: organizations/ryAAh2lQ8uu8MU6zfzIE/requests/textToSpeechRequests/logs
                    loggingDocumentId: tts_log_1234567890
                    requestedBy:
                      email: system@example.com
                      role: 2
                    isCommand: false
                    isOouiCrud: true
                    isLlmCall: false
                    isAdminCrud: false
              with_all_params:
                summary: 全パラメータ指定
                value:
                  request_id: ttsRequest_9876543210
                  input:
                    text: これは音声合成のテストです。自然な発音で読み上げます。
                    voiceName: Zephyr
                    outputBucketName: storyvault-audio
                    outputFilePath: audio/narration/chapter1.wav
                    projectId: project_789
                  systemMetadata:
                    organizationId: org_456
                    spaceId: space_456
                    loggingCollectionId: requestLogs
                    loggingDocumentId: tts_log_456
                    requestedBy:
                      email: system@example.com
                      role: 2
                    isCommand: false
                    isOouiCrud: true
                    isLlmCall: false
                    isAdminCrud: false
      responses:
        "200":
          description: 音声生成が正常に完了
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SynthesizeSuccessResponse"
              examples:
                success:
                  summary: 成功レスポンス例（ResponseFormatter形式）
                  value:
                    status: success
                    request_id: ttsRequest_1234567890
                    output:
                      audio_path: gs://storyvault-audio/audio/output.wav
                      audio_size_bytes: 45678
                      audio_duration: 3.5
                      processing_time: 1.2
                      voice_used: Aoede
                      metadata:
                        audio_format: WAV
                        sample_rate: 24000
                        channels: 1
        "400":
          description: リクエストパラメータのバリデーションエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                validation_error:
                  summary: バリデーションエラー
                  value:
                    status: error
                    request_id: ttsRequest_1234567890
                    error:
                      type: ValidationError
                      message: Request validation failed
                      details:
                        endpoint: /synthesize
                        validation_errors:
                          - field: input.text
                            message: Field required
                            type: missing
        "409":
          description: 重複リクエストエラー（べき等性保証）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                duplicate_request:
                  summary: 重複リクエスト
                  value:
                    status: error
                    request_id: ttsRequest_1234567890
                    error:
                      type: DuplicateRequestError
                      message: Duplicate request detected - request is already being processed
                      details:
                        request_id: ttsRequest_1234567890
                        reason: Request with this ID is already in progress or completed
        "500":
          description: サーバー内部エラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                internal_error:
                  summary: 内部エラー
                  value:
                    status: error
                    request_id: ttsRequest_1234567890
                    error:
                      type: InternalError
                      message: Unexpected server error occurred
                      details:
                        exception: ValueError
                        message: Invalid audio format

  /voices:
    get:
      tags:
        - voices
      summary: 利用可能な音声モデル一覧を取得
      description: |
        Gemini TTSで利用可能な音声モデルの一覧を取得します。

        各音声モデルには以下の情報が含まれます:
        - 音声名
        - 説明
        - 言語コード
        - 性別

      operationId: listVoices
      responses:
        "200":
          description: 音声モデル一覧の取得成功（ResponseFormatter形式）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericSuccessResponse"
              examples:
                success:
                  summary: 成功レスポンス例（ResponseFormatter形式）
                  value:
                    status: success
                    request_id: null
                    output:
                      voices:
                        - name: Zephyr
                          description: 明瞭で自然な男性音声
                          language_codes: ["ja-JP"]
                          gender: MALE
                        - name: Aoede
                          description: 優しく聞き取りやすい女性音声
                          language_codes: ["ja-JP"]
                          gender: FEMALE
                      total_voices: 7
        "500":
          description: サーバー内部エラー（ResponseFormatter形式）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /health:
    get:
      tags:
        - system
      summary: ヘルスチェック
      description: |
        サービスの稼働状態とAPIクライアントの接続状態を確認します。

        ## チェック項目
        - サービス基本情報
        - Gemini API接続状態
        - Google Cloud Storage接続状態
        - アクティブなリクエスト数

      operationId: healthCheck
      responses:
        "200":
          description: サービスが正常に稼働中（ResponseFormatter形式）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericSuccessResponse"
              examples:
                healthy:
                  summary: 正常状態
                  value:
                    status: success
                    request_id: null
                    output:
                      status: healthy
                      timestamp: "2024-10-05T12:00:00.000Z"
                      service_info:
                        name: text-to-speech-with-google
                        version: 2.0.0
                      api_status:
                        gemini_tts: connected
                        storage: connected
                      active_requests: 1
        "503":
          description: サービスが劣化状態（ResponseFormatter形式）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericSuccessResponse"
              examples:
                degraded:
                  summary: 劣化状態
                  value:
                    status: success
                    request_id: null
                    output:
                      status: degraded
                      timestamp: "2024-10-05T12:00:00.000Z"
                      api_status:
                        gemini_tts: "error: API key invalid"
                        storage: connected

components:
  schemas:
    # RequestDoc黄金テンプレート準拠スキーマ
    SynthesizeRequestInput:
      type: object
      description: input セクション - コマンド（入力パラメータ）
      required:
        - text
        - voiceName
        - outputBucketName
        - outputFilePath
      properties:
        text:
          type: string
          description: 音声に変換するテキスト
          minLength: 1
          maxLength: 5000
          example: こんにちは、Gemini Text-to-Speechへようこそ
        voiceName:
          type: string
          description: 音声モデル名
          enum: [Zephyr, Puck, Charon, Aoede, Fenrir, Kore, Perse]
          example: Aoede
        outputBucketName:
          type: string
          description: 出力先のGCSバケット名
          pattern: "^[a-z0-9][a-z0-9._-]{1,61}[a-z0-9]$|^[a-z0-9][a-z0-9_-]{1,61}[a-z0-9]\\.firebasestorage\\.app$"
          example: storyvault-audio
        outputFilePath:
          type: string
          description: 出力ファイルのGCSパス
          minLength: 1
          example: audio/output.wav
        projectId:
          type: string
          description: プロジェクトID（オプション）
          example: project_456

    SynthesizeRequestSystemMetadata:
      type: object
      description: systemMetadata セクション - システムメタデータ
      required:
        - organizationId
        - spaceId
        - loggingCollectionId
        - loggingDocumentId
        - requestedBy
        - isCommand
        - isOouiCrud
        - isLlmCall
        - isAdminCrud
      properties:
        organizationId:
          type: string
          description: 組織ID（マルチテナント対応）
          example: org_123
        spaceId:
          type: string
          description: スペースID（マルチテナント対応）
          example: space_456
        loggingCollectionId:
          type: string
          description: ログ保存先Collection ID
          example: requestLogs
        loggingDocumentId:
          type: string
          description: ログ保存先Document ID
          example: tts_log_123
        requestedBy:
          type: object
          description: リクエスト実行者情報
          properties:
            email:
              type: string
              example: system@example.com
            role:
              type: integer
              example: 2
        isCommand:
          type: boolean
          example: false
        isOouiCrud:
          type: boolean
          example: true
        isLlmCall:
          type: boolean
          example: false
        isAdminCrud:
          type: boolean
          example: false

    SynthesizeRequest:
      type: object
      description: RequestDoc黄金テンプレート準拠（input/systemMetadata構造）
      required:
        - request_id
        - input
        - systemMetadata
      properties:
        request_id:
          type: string
          description: リクエストID（Firebase Background関数で生成）
          example: ttsRequest_1234567890
        input:
          $ref: "#/components/schemas/SynthesizeRequestInput"
        systemMetadata:
          $ref: "#/components/schemas/SynthesizeRequestSystemMetadata"

    # ResponseFormatter統一レスポンス形式
    SynthesizeSuccessResponse:
      type: object
      description: 成功レスポンス（ResponseFormatter形式）
      required:
        - status
        - request_id
        - output
      properties:
        status:
          type: string
          enum: [success]
          description: 処理結果ステータス
          example: success
        request_id:
          type: string
          description: リクエストID（エコーバック）
          example: ttsRequest_1234567890
        output:
          type: object
          description: 出力データ（TypeScript zodスキーマ準拠）
          required:
            - outputPath
            - fileSizeBytes
            - processingTime
          properties:
            outputPath:
              type: string
              description: 生成された音声ファイルのGCSパス
              example: gs://storyvault-audio/audio/output.wav
            audioFormat:
              type: string
              description: 音声フォーマット
              example: WAV
            durationSeconds:
              type: number
              format: float
              description: 音声の長さ（秒）
              example: 3.5
              minimum: 0
            fileSizeBytes:
              type: integer
              description: 音声ファイルサイズ（バイト）
              example: 45678
              minimum: 0
            voiceUsed:
              type: string
              description: 使用された音声モデル名
              example: Aoede
            processingTime:
              type: number
              format: float
              description: 処理時間（秒）
              example: 1.2
              minimum: 0

    ErrorResponse:
      type: object
      description: エラーレスポンス（ResponseFormatter形式）
      required:
        - status
        - request_id
        - error
      properties:
        status:
          type: string
          enum: [error]
          description: 処理結果ステータス
          example: error
        request_id:
          type: string
          description: リクエストID
          example: ttsRequest_1234567890
        error:
          type: object
          required:
            - type
            - message
          properties:
            type:
              type: string
              description: エラータイプ
              enum:
                [
                  ValidationError,
                  ProcessingError,
                  StorageError,
                  DuplicateRequestError,
                  InternalError,
                ]
              example: ValidationError
            message:
              type: string
              description: 人間可読なエラーメッセージ
              example: Request validation failed
            details:
              type: object
              description: エラー詳細情報
              additionalProperties: true

    VoicesResult:
      type: object
      required:
        - voices
        - total_voices
      properties:
        voices:
          type: array
          description: 利用可能な音声モデルの配列
          items:
            $ref: "#/components/schemas/VoiceModel"
        total_voices:
          type: integer
          description: 音声モデル総数
          example: 7

    VoiceModel:
      type: object
      required:
        - name
        - description
        - language_codes
        - gender
      properties:
        name:
          type: string
          description: 音声モデル名
          example: Aoede
        description:
          type: string
          description: 音声の特徴説明
          example: 優しく聞き取りやすい女性音声
        language_codes:
          type: array
          items:
            type: string
          description: 対応言語コード
          example: ["ja-JP"]
        gender:
          type: string
          enum: [MALE, FEMALE, NEUTRAL]
          description: 音声の性別
          example: FEMALE

    HealthCheckResult:
      type: object
      required:
        - status
        - timestamp
        - service_info
        - api_status
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
          description: サービスの健全性ステータス
          example: healthy
        timestamp:
          type: string
          format: date-time
          description: ヘルスチェック実行時刻（ISO 8601形式）
          example: "2024-10-05T12:00:00.000Z"
        service_info:
          type: object
          description: サービス基本情報
          properties:
            name:
              type: string
              example: text-to-speech-with-google
            version:
              type: string
              example: 2.0.0
        api_status:
          type: object
          description: 各APIクライアントの接続状態
          properties:
            gemini_tts:
              type: string
              example: connected
            storage:
              type: string
              example: connected
        active_requests:
          type: integer
          description: 現在処理中のリクエスト数
          example: 1
          minimum: 0

    GenericSuccessResponse:
      type: object
      description: 成功レスポンス（ResponseFormatter形式の汎用）
      required:
        - status
        - request_id
        - output
      properties:
        status:
          type: string
          enum: [success]
          example: success
        request_id:
          type: string
          nullable: true
          description: リクエストID（エコーバック、存在しない場合は null）
          example: null
        output:
          oneOf:
            - $ref: "#/components/schemas/VoicesResult"
            - $ref: "#/components/schemas/HealthCheckResult"
            - type: object
              additionalProperties: true
