openapi: 3.0.3
info:
  title: Aqua Voice Audio Transcription API
  version: 1.0.0
  description: |
    Aqua Voice Avalon APIを使用した音声・動画文字起こしマイクロサービス

    このAPIは、GCS上の音声ファイル、または動画ファイルから
    文字起こしを実行し、結果をGoogle Cloud Storageに保存します。

    **注意**: YouTube URLモードは非対応です。GCS音声/動画ファイルのみサポートします。

    ## 主な機能
    - GCS音声/動画ファイルの文字起こし
    - Aqua Voice Avalon APIによる高精度認識
    - OpenAI互換の音声文字起こしAPI
    - 段落整形（Gemini統合、オプション）
    - 結果のJSON形式保存
    - Application Default Credentials (ADC)による認証

  contact:
    name: Vohance Development Team
    url: https://github.com/vohance
  license:
    name: Proprietary

servers:
  - url: http://localhost:8080
    description: ローカル開発環境
  - url: https://transcribe-audio-with-gcp-speech-to-text-328416367800.asia-northeast1.run.app
    description: Cloud Run本番環境

tags:
  - name: transcription
    description: 文字起こし関連のエンドポイント
  - name: system
    description: システム管理関連のエンドポイント

paths:
  /transcribe:
    post:
      tags:
        - transcription
      summary: 音声・動画ファイルの文字起こし
      description: |
        GCS音声ファイル、またはGCS動画ファイルから文字起こしを実行します。

        ## 処理フロー
        1. GCSパス検証とファイル存在確認
        2. 動画の場合は音声抽出（FFmpeg）
        3. Aqua Voice Avalon APIで文字起こし実行
        4. 段落整形（オプション、Gemini使用）
        5. 結果をGCSに保存

        ## サポートモード
        - `audioFile`: GCS音声ファイルから文字起こし
        - `videoFile`: GCS動画ファイルから文字起こし（音声抽出後）

        ## 非対応モード
        - `youtube`: YouTube URLは非対応（400エラー）

      operationId: transcribeAudio
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TranscribeRequest"
            examples:
              audio_file:
                summary: GCS音声ファイルの文字起こし
                value:
                  request_id: req_20241005_120000_abc
                  input:
                    mode: audioFile
                    sourceFileBucketName: vohance-sandbox
                    sourceFilePath: transcribeAudioWithGcpSpeechToText/001-sibutomo.mp3
                    outputBucketName: vohance-sandbox
                    outputFilePath: transcribeAudioWithGcpSpeechToText/testResult
                    enableParagraphFormatting: true
                    videoId: video_123
                    projectId: project_456
                  systemMetadata:
                    organizationId: ryAAh2lQ8uu8MU6zfzIE
                    spaceId: space_456
                    loggingCollectionId: videoTranscriptionRequests
                    loggingDocumentId: req_20241005_120000_abc
                    requestedBy:
                      email: system@example.com
                      role: 2
                    isCommand: false
                    isOouiCrud: true
                    isLlmCall: false
                    isAdminCrud: false
              video_file:
                summary: GCS動画ファイルの文字起こし
                value:
                  request_id: req_20241005_120000_abc
                  input:
                    mode: videoFile
                    sourceFileBucketName: vohance-videos
                    sourceFilePath: videos/sample.mp4
                    outputBucketName: vohance-transcripts
                    outputFilePath: transcripts/video/output.json
                    enableParagraphFormatting: true
                    videoId: video_123
                    projectId: project_456
                  systemMetadata:
                    organizationId: ryAAh2lQ8uu8MU6zfzIE
                    spaceId: space_456
                    loggingCollectionId: videoTranscriptionRequests
                    loggingDocumentId: req_20241005_120000_abc
                    requestedBy:
                      email: system@example.com
                      role: 2
                    isCommand: false
                    isOouiCrud: true
                    isLlmCall: false
                    isAdminCrud: false
      responses:
        "200":
          description: 文字起こしが正常に完了
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TranscribeResponse"
              examples:
                success:
                  summary: 成功レスポンス例
                  value:
                    success: true
                    transcription_path: gs://vohance-transcripts/transcripts/output.json
                    transcription_id: aqua_voice_1234567890
                    processing_time: 15.3
                    statistics:
                      character_count: 1234
                      language: ja-JP
                      language_confidence: 0.98
                      duration_seconds: 120.5
                    paragraph_count: 5
        "400":
          description: リクエストパラメータのバリデーションエラー、またはyoutubeモード使用
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                youtube_not_supported:
                  summary: YouTubeモード非対応エラー
                  value:
                    error: "youtube mode is not supported. Use audioFile or videoFile mode with GCS path"
                    request_id: req_20241005_120000_abc
                    details:
                      supported_modes: ["audioFile", "videoFile"]
                validation_error:
                  summary: バリデーションエラー
                  value:
                    error: "mode is required and must be one of: audioFile, videoFile"
                    request_id: req_20241005_120000_abc
        "500":
          description: サーバー内部エラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                api_error:
                  summary: Aqua Voice API エラー
                  value:
                    error: "Aqua Voice API error"
                    request_id: req_20241005_120000_abc
                    details:
                      error_type: "RuntimeError"

  /health:
    get:
      tags:
        - system
      summary: ヘルスチェック
      description: |
        サービスの健全性を確認します。

        ## チェック項目
        - サービス基本情報
        - GCS接続状態
        - Aqua Voice API設定状態
        - サービス設定

      operationId: healthCheck
      responses:
        "200":
          description: サービスは正常
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              examples:
                healthy:
                  summary: 正常状態
                  value:
                    status: healthy
                    service:
                      name: transcribe-audio-with-gcp-speech-to-text
                      version: 1.0.0
                      environment: production
                      started_at: "2024-10-05T12:00:00Z"
                    timestamp: "2024-10-05 12:00:00 UTC"
                    api_status:
                      gcs_access: true
                      aqua_voice_api: true
                    configuration:
                      aqua_voice_base_url: https://api.aquavoice.com/api/v1
                      aqua_voice_model: avalon-v1.5
                      timeout: 600
                      paragraph_formatting: true
        "503":
          description: サービスが異常（degraded）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              examples:
                degraded:
                  summary: 異常状態
                  value:
                    status: degraded
                    errors:
                      - "AQUA_VOICE_API_KEY is not configured"
                    service:
                      name: transcribe-audio-with-gcp-speech-to-text
                      version: 1.0.0
                    timestamp: "2024-10-05 12:00:00 UTC"

components:
  schemas:
    TranscribeRequest:
      type: object
      required:
        - request_id
        - input
        - systemMetadata
      properties:
        request_id:
          type: string
          description: リクエスト一意識別子
          example: req_20241005_120000_abc
        input:
          $ref: "#/components/schemas/TranscribeInput"
        systemMetadata:
          $ref: "#/components/schemas/TranscribeSystemMetadata"

    TranscribeInput:
      type: object
      required:
        - mode
        - sourceFileBucketName
        - sourceFilePath
        - outputBucketName
        - outputFilePath
      properties:
        mode:
          type: string
          enum: [audioFile, videoFile]
          description: 文字起こしモード（youtubeは非対応）
          example: audioFile
        sourceFileBucketName:
          type: string
          description: ソースファイルのGCSバケット名
          example: vohance-sandbox
        sourceFilePath:
          type: string
          description: ソースファイルのGCSパス
          example: audio/sample.flac
        outputBucketName:
          type: string
          description: 出力先のGCSバケット名
          example: vohance-transcripts
        outputFilePath:
          type: string
          description: 出力ファイルのGCSパス
          example: transcripts/output.json
        enableParagraphFormatting:
          type: boolean
          description: Gemini段落整形を有効化
          default: true
        videoId:
          type: string
          description: 動画ID
          example: video_123
        projectId:
          type: string
          description: プロジェクトID
          example: project_456

    TranscribeSystemMetadata:
      type: object
      required:
        - organizationId
        - spaceId
        - loggingCollectionId
        - loggingDocumentId
        - requestedBy
        - isCommand
        - isOouiCrud
        - isLlmCall
        - isAdminCrud
      properties:
        organizationId:
          type: string
          description: 組織ID
          example: ryAAh2lQ8uu8MU6zfzIE
        spaceId:
          type: string
          description: スペースID（マルチテナント対応）
          example: space_456
        loggingCollectionId:
          type: string
          description: ロギングコレクションID
          example: videoTranscriptionRequests
        loggingDocumentId:
          type: string
          description: ロギングドキュメントID
          example: req_20241005_120000_abc
        requestedBy:
          type: object
          description: リクエスト実行者情報
          properties:
            email:
              type: string
              example: system@example.com
            role:
              type: integer
              example: 2
        isCommand:
          type: boolean
          example: false
        isOouiCrud:
          type: boolean
          example: true
        isLlmCall:
          type: boolean
          example: false
        isAdminCrud:
          type: boolean
          example: false

    TranscribeResponse:
      type: object
      properties:
        success:
          type: boolean
          description: 成功フラグ
          example: true
        transcriptionPath:
          type: string
          description: 文字起こし結果のGCSパス（TypeScript RequestDoc準拠）
          example: gs://vohance-transcripts/transcripts/output.json
        transcriptionBucketName:
          type: string
          description: 文字起こし結果のGCSバケット名（TypeScript RequestDoc準拠）
          example: vohance-transcripts
        transcriptionFilePath:
          type: string
          description: 文字起こし結果のGCSファイルパス（TypeScript RequestDoc準拠）
          example: transcripts/output.json
        transcriptionId:
          type: string
          description: Aqua Voice transcription ID（TypeScript RequestDoc準拠）
          example: aqua_voice_1234567890
        processingTime:
          type: number
          description: 処理時間（秒）（TypeScript RequestDoc準拠）
          example: 15.3
        statistics:
          $ref: "#/components/schemas/TranscriptionStatistics"
        paragraphCount:
          type: integer
          description: 段落数（Gemini処理実行時のみ）（TypeScript RequestDoc準拠）
          example: 5

    TranscriptionStatistics:
      type: object
      properties:
        characterCount:
          type: integer
          description: 文字数（TypeScript RequestDoc準拠）
          example: 1234
        language:
          type: string
          description: 検出言語コード
          example: ja-JP
        languageConfidence:
          type: number
          description: 言語検出信頼度（0.0-1.0）（TypeScript RequestDoc準拠）
          example: 0.98
        durationSeconds:
          type: number
          description: 音声長（秒）（TypeScript RequestDoc準拠）
          example: 120.5

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: エラーメッセージ
          example: Request validation failed
        request_id:
          type: string
          description: リクエストID
          example: req_20241005_120000_abc
        details:
          type: object
          description: エラー詳細情報
          additionalProperties: true

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
          description: サービスステータス
          example: healthy
        service:
          type: object
          properties:
            name:
              type: string
              example: transcribe-audio-with-gcp-speech-to-text
            version:
              type: string
              example: 1.0.0
            environment:
              type: string
              example: production
            started_at:
              type: string
              format: date-time
              example: "2024-10-05T12:00:00Z"
        timestamp:
          type: string
          description: ヘルスチェック実行時刻
          example: "2024-10-05 12:00:00 UTC"
        api_status:
          type: object
          properties:
            gcs_access:
              type: boolean
              example: true
            aqua_voice_api:
              type: boolean
              example: true
        configuration:
          type: object
          properties:
            aqua_voice_base_url:
              type: string
              example: https://api.aquavoice.com/api/v1
            aqua_voice_model:
              type: string
              example: avalon-v1.5
            timeout:
              type: integer
              example: 600
            paragraph_formatting:
              type: boolean
              example: true
        errors:
          type: array
          items:
            type: string
          description: エラーメッセージリスト（degraded/unhealthyの場合のみ）
          example: ["AQUA_VOICE_API_KEY is not configured"]
