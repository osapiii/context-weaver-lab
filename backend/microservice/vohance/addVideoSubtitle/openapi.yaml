openapi: 3.0.3
info:
  title: Add Video Subtitle Service
  description: |
    Generates SRT and ASS subtitle files from caption segments, burns the ASS
    subtitles into a final MP4 with FFmpeg/libass, and uploads all outputs to GCS.
  version: 1.1.0
  contact:
    name: Vohance Platform Team

servers:
  - url: https://addvideosubtitle-placeholder.a.run.app
    description: Cloud Run Production (placeholder)

paths:
  /add-subtitles:
    post:
      summary: Generate subtitles and a subtitled video
      description: |
        Downloads a final MP4 from GCS, creates SRT and ASS subtitle files from
        captionSegments, renders a subtitled MP4 using FFmpeg/libass and Noto CJK,
        then uploads the subtitled MP4, SRT and ASS back to GCS.
      operationId: addVideoSubtitles
      tags:
        - Subtitles
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProcessRequest"
            examples:
              business:
                summary: Business subtitle rendering request
                value:
                  request_id: "req_abc123"
                  input:
                    videoBucketName: "en-aistudio-development.appspot.com"
                    videoFilePath: "organizations/org_enostech/spaces/default/videos/video123/exports/final.mp4"
                    outputBucketName: "en-aistudio-development.appspot.com"
                    outputFilePath: "organizations/org_enostech/spaces/default/videos/video123/exports/subtitles/final_subtitled.mp4"
                    subtitleSrtOutputFilePath: "organizations/org_enostech/spaces/default/videos/video123/exports/subtitles/final.srt"
                    subtitleAssOutputFilePath: "organizations/org_enostech/spaces/default/videos/video123/exports/subtitles/final.ass"
                    videoId: "video123"
                    projectId: "project456"
                    captionSegments:
                      - startMs: 0
                        endMs: 3200
                        text: "最初の字幕です"
                      - startMs: 3500
                        endMs: 6200
                        text: "次の字幕です"
                    captionStyle:
                      preset: "business_emphasis"
                      position: "bottom"
                      fontScale: 1
                  systemMetadata:
                    organizationId: "org_enostech"
                    spaceId: "default"
                    loggingCollectionId: "requests/addVideoSubtitleRequests/logs"
                    loggingDocumentId: "log_abc123"
                    requestedBy:
                      email: "system@example.com"
                      role: 2
                    isCommand: false
                    isOouiCrud: true
                    isLlmCall: false
                    isAdminCrud: false
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Processing error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    SubtitleSegment:
      type: object
      properties:
        startMs:
          type: integer
          minimum: 0
          description: Start timestamp in milliseconds
        endMs:
          type: integer
          minimum: 1
          description: End timestamp in milliseconds
        text:
          type: string
          minLength: 1
          maxLength: 500
      required: [startMs, endMs, text]

    SubtitleStyle:
      type: object
      properties:
        preset:
          type: string
          enum:
            - clear_standard
            - business_emphasis
            - cinema_bottom
            - shorts_pop
            - soft_gray_panel
          default: clear_standard
        position:
          type: string
          enum: [top, bottom]
          default: bottom
        fontScale:
          type: number
          minimum: 0.5
          maximum: 2
          default: 1
        fontColor:
          type: string
          nullable: true
        outlineColor:
          type: string
          nullable: true
        backColor:
          type: string
          nullable: true
        bold:
          type: boolean
          nullable: true

    AddSubtitleInput:
      type: object
      properties:
        videoBucketName:
          type: string
        videoFilePath:
          type: string
        outputBucketName:
          type: string
        outputFilePath:
          type: string
          description: Destination path for the subtitled MP4
        subtitleSrtOutputFilePath:
          type: string
          nullable: true
          description: Destination path for the generated SRT file
        subtitleAssOutputFilePath:
          type: string
          nullable: true
          description: Destination path for the generated ASS file
        videoId:
          type: string
        projectId:
          type: string
        captionSegments:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/SubtitleSegment"
        captionStyle:
          $ref: "#/components/schemas/SubtitleStyle"
      required:
        - videoBucketName
        - videoFilePath
        - outputBucketName
        - outputFilePath
        - videoId
        - captionSegments

    SystemMetadata:
      type: object
      properties:
        organizationId:
          type: string
        spaceId:
          type: string
        loggingCollectionId:
          type: string
        loggingDocumentId:
          type: string
        requestedBy:
          type: object
        isCommand:
          type: boolean
        isOouiCrud:
          type: boolean
        isLlmCall:
          type: boolean
        isAdminCrud:
          type: boolean
      required:
        - organizationId
        - spaceId
        - loggingCollectionId
        - loggingDocumentId
        - requestedBy
        - isCommand
        - isOouiCrud
        - isLlmCall
        - isAdminCrud

    ProcessRequest:
      type: object
      properties:
        request_id:
          type: string
        input:
          $ref: "#/components/schemas/AddSubtitleInput"
        systemMetadata:
          $ref: "#/components/schemas/SystemMetadata"
      required: [request_id, input, systemMetadata]

    SubtitleAsset:
      type: object
      properties:
        resultBucketName:
          type: string
        resultFilePath:
          type: string
      required: [resultBucketName, resultFilePath]

    SubtitleStatistics:
      type: object
      properties:
        totalSubtitleSegments:
          type: integer
        totalDurationSeconds:
          type: number
        subtitledVideoFileSizeBytes:
          type: integer
        srtFileSizeBytes:
          type: integer
        assFileSizeBytes:
          type: integer

    AddSubtitleOutput:
      type: object
      properties:
        resultBucketName:
          type: string
        resultFilePath:
          type: string
        subtitledVideo:
          $ref: "#/components/schemas/SubtitleAsset"
        srt:
          $ref: "#/components/schemas/SubtitleAsset"
        ass:
          $ref: "#/components/schemas/SubtitleAsset"
        processingTime:
          type: number
        statistics:
          $ref: "#/components/schemas/SubtitleStatistics"
      required:
        - resultBucketName
        - resultFilePath
        - subtitledVideo
        - srt
        - ass
        - processingTime

    SuccessResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        request_id:
          type: string
        output:
          $ref: "#/components/schemas/AddSubtitleOutput"
        processing_time:
          type: number
      required: [status, request_id, output]

    ErrorResponse:
      type: object
      properties:
        status:
          type: string
          example: error
        request_id:
          type: string
        error:
          type: object
          properties:
            type:
              type: string
            message:
              type: string
            details:
              type: object
