components:
  schemas:
    AudioSegmentInput:
      type: object
      required:
        - sourceBucketName
        - sourceFilePath
        - timestampMs
      properties:
        sourceBucketName:
          type: string
          description: 音声ファイルバケット名
          minLength: 1
        sourceFilePath:
          type: string
          description: 音声ファイルパス
          minLength: 1
        timestampMs:
          type: integer
          description: タイムスタンプ（ミリ秒、0以上）
          minimum: 0

    CaptionSegmentInput:
      type: object
      required:
        - timestampMs
        - text
      properties:
        timestampMs:
          type: integer
          description: 字幕表示開始タイムスタンプ（ミリ秒、0以上）
          minimum: 0
        text:
          type: string
          description: 字幕テキスト（1-500文字）
          minLength: 1
          maxLength: 500

    CaptionStyleInput:
      type: object
      properties:
        position:
          type: string
          description: "字幕位置（top: 画面上, bottom: 画面下）"
          enum: [top, bottom]
          default: bottom
        fontName:
          type: string
          description: フォント名（未指定時はデフォルト日本語フォント）
          nullable: true
        fontSize:
          type: integer
          description: 文字サイズ（10-200）
          minimum: 10
          maximum: 200
          default: 40
        fontColor:
          type: string
          description: 文字色（CSS color名 or #RRGGBB）
          default: white
        strokeColor:
          type: string
          description: 枠線色（CSS color名 or #RRGGBB）
          default: black
        strokeWidth:
          type: integer
          description: 枠線太さ（0-10、0=枠線なし）
          minimum: 0
          maximum: 10
          default: 2

    MergeInput:
      type: object
      required:
        - videoBucketName
        - videoFilePath
        - audioSegments
        - outputBucketName
        - outputFilePath
        - videoId
      properties:
        videoBucketName:
          type: string
          description: 動画ファイルバケット名
          minLength: 1
        videoFilePath:
          type: string
          description: 動画ファイルパス（.mp4拡張子）
          pattern: ".*\\.mp4$"
        audioSegments:
          type: array
          description: 音声セグメントリスト（空でないこと）
          minItems: 1
          items:
            $ref: "#/components/schemas/AudioSegmentInput"
        outputBucketName:
          type: string
          description: 出力バケット名
          minLength: 1
        outputFilePath:
          type: string
          description: 出力ファイルパス（.mp4拡張子）
          pattern: ".*\\.mp4$"
        videoId:
          type: string
          description: 動画ID
          minLength: 1
        projectId:
          type: string
          description: プロジェクトID（オプション）
          nullable: true
        captionIsEnabled:
          type: boolean
          description: 字幕機能を有効化
          default: false
        captionSegments:
          type: array
          description: 字幕セグメントリスト（captionIsEnabled=trueの場合に必須）
          items:
            $ref: "#/components/schemas/CaptionSegmentInput"
        captionStyle:
          $ref: "#/components/schemas/CaptionStyleInput"
          description: 字幕スタイル設定（オプション、未指定時はデフォルトスタイル適用）

    MergeSystemMetadata:
      type: object
      required:
        - organizationId
        - spaceId
        - loggingCollectionId
        - loggingDocumentId
        - requestedBy
        - isCommand
        - isOouiCrud
        - isLlmCall
        - isAdminCrud
      properties:
        organizationId:
          type: string
          description: 組織ID（マルチテナント対応、必須）
          minLength: 1
        spaceId:
          type: string
          description: スペースID（マルチテナント対応、必須）
          minLength: 1
        loggingCollectionId:
          type: string
          description: ログ保存先Collection
          minLength: 1
        loggingDocumentId:
          type: string
          description: ログ保存先DocumentID
          minLength: 1
        requestedBy:
          type: object
          description: リクエスト実行者情報
          properties:
            email:
              type: string
              example: system@example.com
            role:
              type: integer
              example: 2
        isCommand:
          type: boolean
          example: false
        isOouiCrud:
          type: boolean
          example: true
        isLlmCall:
          type: boolean
          example: false
        isAdminCrud:
          type: boolean
          example: false

    ProcessRequest:
      type: object
      required:
        - request_id
        - input
        - systemMetadata
      properties:
        request_id:
          type: string
          description: リクエストID
          minLength: 1
        input:
          $ref: "#/components/schemas/MergeInput"
        systemMetadata:
          $ref: "#/components/schemas/MergeSystemMetadata"

    MergeOutput:
      type: object
      required:
        - resultBucketName
        - resultFilePath
        - processingTime
      properties:
        resultBucketName:
          type: string
          description: 結果ファイルバケット名
        resultFilePath:
          type: string
          description: 結果ファイルパス
        processingTime:
          type: number
          format: float
          description: 処理時間（秒）
          minimum: 0

    ProcessResponse:
      type: object
      required:
        - output
        - processing_time
      properties:
        output:
          $ref: "#/components/schemas/MergeOutput"
        processing_time:
          type: number
          format: float
          description: 処理時間（メタデータ）
          minimum: 0

    ErrorResponse:
      type: object
      required:
        - status
        - error
      properties:
        status:
          type: string
          enum: ["error"]
          description: レスポンスステータス（常に "error"）
        request_id:
          type: string
          description: リクエストID（ログトレース用）
          nullable: true
        error:
          type: object
          required:
            - type
            - message
          properties:
            type:
              type: string
              description: エラータイプ（InternalError, ValidationError, ProcessingError, etc.）
            message:
              type: string
              description: 人間可読なエラーメッセージ
            details:
              type: object
              description: エラー詳細情報（オプション）
              additionalProperties: true

tags:
  - name: Merge
    description: 動画・音声マージ操作
  - name: Health
    description: ヘルスチェック
