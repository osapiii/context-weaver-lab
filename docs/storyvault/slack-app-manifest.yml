display_information:
  name: StoryVault
  description: Collects Slack conversations as StoryVault operation-video context.
  background_color: "#5B2A86"
features:
  bot_user:
    display_name: storyvault
    always_online: false
oauth_config:
  redirect_urls:
    - https://storyvault-dev.web.app/admin/storyvault/slack-callback
    - http://127.0.0.1:3000/admin/storyvault/slack-callback
  scopes:
    bot:
      - channels:read
      - channels:history
      - groups:read
      - groups:history
settings:
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
