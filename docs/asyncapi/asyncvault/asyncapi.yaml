    channel:
      $ref: '#/channels/adkInvokeRequests'
    messages:
      - $ref: '#/channels/adkInvokeRequests/messages/updated'
  createAutoSectionVideoRequest:
    action: send
    channel:
      $ref: '#/channels/autoSectionVideoRequests'
  watchAutoSectionVideoRequest:
    action: receive
    channel:
      $ref: '#/channels/autoSectionVideoRequests'
  createVideoTranscriptionRequest:
    action: send
    channel:
      $ref: '#/channels/videoTranscriptionRequests'
  watchVideoTranscriptionRequest:
    action: receive
    channel:
      $ref: '#/channels/videoTranscriptionRequests'
