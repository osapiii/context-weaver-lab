asyncapi: 3.1.0
info:
  title: AsyncVault RequestDoc Event API
  version: "2026.07.07"
  description: |
    AsyncVault は、このリポジトリで採用されている Firestore RequestDoc ベースの非同期 API 群を指す社内ドキュメント名です。

    画面や Store は RequestDoc を Firestore に作成し、Firebase Functions が onCreate で Cloud Run worker、ADK Agent、または GCP Workflows を起動します。UI は同じ RequestDoc を購読し、`status`、`logs`、`output`、`progress`、`steps`、`workflow` を使って進捗と結果を表示します。

    この仕様書は StoryVault の動画生成・文字起こし・ADK エージェント連携を中心に、関連する取り込み系 RequestDoc も横断して整理しています。
defaultContentType: application/json
servers:
  firestore:
    host: firestore.googleapis.com
    protocol: firestore
    description: Firestore RequestDoc コレクション
  firebaseFunctions:
    host: asia-northeast1
    protocol: firebase-functions
    description: Firestore trigger / callable function
  cloudRun:
    host: run.app
    protocol: https
    description: StoryVault worker、ADK Agent、Workflow kicker
  workflows:
    host: workflowexecutions.googleapis.com
    protocol: https
    description: GCP Workflows 実行 API
channels:
  adkInvokeRequests:
    address: organizations/{organizationId}/spaces/{spaceId}/requests/adkInvokeRequests/logs/{requestId}
    title: ADK エージェント会話
    summary: StoryVault/EN AIstudio の各 ADK モードを RequestDoc 経由で実行します。
    description: |
      ### 何のジョブか
      `guide`、`writing`、`sheet`、`image`、`research`、`storyvault_related_context`、`storyvault_zapping_analysis`、`storyvault_capability_structuring`、`storyvault_story_generation` などの ADK Agent 呼び出しを非同期化します。

      ### 作成元
      - `app/stores/enAiStudioAssistant.ts`
      - `app/stores/storyVault.ts`
      - `app/components/storyVault/StoryVaultOperationVideoPanel.vue`
      - `backend/adk-agents/storyvault_related_context/smoke_related_context.py`

      ### 処理チェーン
      Frontend/Tool -> Firestore RequestDoc -> `backend/app/triggers/adk_invoke_requests.py::on_adk_invoke_request_created` -> Cloud Run ADK Agent `/v1/agents/{mode}/invoke` -> SSE 消費 -> RequestDoc 更新。

      ### UI が見る主な writeback
      `status`、`logs`、`microServicePayload`、`output.responseTextLength`、`output.artifactCount`、`output.sourceReferenceCount`、`output.sessionId`、`output.storyvault_related_context`、`output.storyvault_zapping_analysis`、`errorMessage`。
    parameters:
      organizationId:
        $ref: '#/components/parameters/organizationId'
      spaceId:
        $ref: '#/components/parameters/spaceId'
      requestId:
        $ref: '#/components/parameters/requestId'
    messages:
      created:
        $ref: '#/components/messages/AdkInvokeRequestCreated'
      updated:
        $ref: '#/components/messages/RequestDocUpdated'
    x-haiff:
      screens:
        - app/components/storyVault/StoryVaultOperationVideoPanel.vue
        - app/pages/admin/storyvault/*.vue
      callers:
        - app/stores/enAiStudioAssistant.ts
        - app/stores/storyVault.ts
      trigger: backend/app/triggers/adk_invoke_requests.py::on_adk_invoke_request_created
      processor: Firebase Function -> Cloud Run ADK Agent -> SSE -> Firestore RequestDoc
  autoSectionVideoRequests:
    address: organizations/{organizationId}/spaces/{spaceId}/requests/autoSectionVideoRequests/logs/{requestId}
    title: 動画 自動セクション分割
    summary: アップロード済み動画を解析し、StoryVault 編集用のセクション候補を生成します。
    description: |
      ### 何のジョブか
      動画ファイルを Gemini 解析し、セクション境界、タイトル、説明、切り出し候補を生成します。

      ### 作成元
      `app/components/AgentWorkspace/VideoStudioWorkspace.vue` のプロジェクト作成/自動セクション化操作。

      ### 処理チェーン
      Video Studio -> RequestDoc -> `storyvault_video_requests.py::on_auto_section_video_request_created` -> Cloud Run `backend/microservice/storyvaultVideo/aiVideoSectioning` `/auto-section` -> RequestDoc `output.sections`。

      ### UI が見る主な writeback
      `status`、`logs`、`output.sections`、`errorMessage`。
    messages:
      created:
        $ref: '#/components/messages/VideoRequestCreated'
      updated:
        $ref: '#/components/messages/RequestDocUpdated'
    x-haiff:
      screens:
        - app/components/AgentWorkspace/VideoStudioWorkspace.vue
      trigger: backend/app/triggers/storyvault_video_requests.py::on_auto_section_video_request_created
      processor: Firebase Function -> aiVideoSectioning /auto-section
      cloudRun:
        service: backend/microservice/storyvaultVideo/aiVideoSectioning
        route: /auto-section
  splitVideoRequests:
    address: organizations/{organizationId}/spaces/{spaceId}/requests/splitVideoRequests/logs/{requestId}
    title: 動画 分割
    summary: 指定タイムスタンプで動画を複数セクションに分割します。
    description: |
      ### 何のジョブか
      StoryVault のセクション編集結果をもとに、元動画をセクション単位の動画ファイルへ分割します。

      ### 処理チェーン
      Video Studio -> RequestDoc -> `on_split_video_request_created` -> Cloud Run `splitVideoByTimestamps` `/split` -> RequestDoc `output`。
    messages:
      created:
        $ref: '#/components/messages/VideoRequestCreated'
      updated:
        $ref: '#/components/messages/RequestDocUpdated'
    x-haiff:
      trigger: backend/app/triggers/storyvault_video_requests.py::on_split_video_request_created
      processor: Firebase Function -> splitVideoByTimestamps /split
  videoTranscriptionRequests:
    address: organizations/{organizationId}/spaces/{spaceId}/requests/videoTranscriptionRequests/logs/{requestId}
    title: 動画/音声 文字起こし
    summary: セクション音声または元動画音声を文字起こしし、JSON/SRT 相当の結果を保存します。
    description: |
      ### 何のジョブか
      録音音声、元動画音声、セクション音声を GCP Speech-to-Text/Aqua 系処理で文字起こしします。

      ### 作成元
      `app/components/AgentWorkspace/VideoStudioWorkspace.vue` のナレーション録音後、または既存音声の文字起こし操作。

      ### 処理チェーン
      Video Studio -> RequestDoc -> `on_video_transcription_request_created` -> Cloud Run `transcribeAudioWithGcpSpeechToText` `/transcribe` -> RequestDoc `output.transcriptionBucketName` / `output.transcriptionFilePath`。

      ### UI が見る主な writeback
      `status`、`output.transcriptionFilePath`、`output.transcript` 系、`errorMessage`。
    messages:
      created:
        $ref: '#/components/messages/VideoRequestCreated'
      updated:
        $ref: '#/components/messages/RequestDocUpdated'
    x-haiff:
      trigger: backend/app/triggers/storyvault_video_requests.py::on_video_transcription_request_created
      processor: Firebase Function -> transcribeAudioWithGcpSpeechToText /transcribe
  textToSpeechRequests:
    address: organizations/{organizationId}/spaces/{spaceId}/requests/textToSpeechRequests/logs/{requestId}
    title: AI ナレーション音声生成
    summary: テキストから StoryVault セクション用の音声ファイルを生成します。
    description: |
      ### 何のジョブか
      ナレーション本文や音声プレビュー文を Google TTS 系 worker へ渡し、GCS に音声を保存します。

      ### 作成元
      `app/components/AgentWorkspace/VideoStudioWorkspace.vue` の音声プレビュー、個別ナレーション生成、一括生成。

      ### 処理チェーン
      Video Studio -> RequestDoc -> `on_text_to_speech_request_created` -> Cloud Run `textToSpeechWithGoogle` `/synthesize` -> RequestDoc `output.outputPath` / `output.durationSeconds`。
    messages:
      created:
        $ref: '#/components/messages/VideoRequestCreated'
      updated:
        $ref: '#/components/messages/RequestDocUpdated'
    x-haiff:
      trigger: backend/app/triggers/storyvault_video_requests.py::on_text_to_speech_request_created
      processor: Firebase Function -> textToSpeechWithGoogle /synthesize
  mergeVideoAudioNarrationRequests:
    address: organizations/{organizationId}/spaces/{spaceId}/requests/mergeVideoAudioNarrationRequests/logs/{requestId}
    title: 動画と AI ナレーションの合成
    summary: セクション動画にナレーション音声を重ねた最終素材を生成します。
    description: |
      ### 何のジョブか
      セクション動画、AI ナレーション、BGM/音量設定をもとに、音声付き動画を生成します。

      ### 処理チェーン
      Video Studio -> RequestDoc -> `on_merge_video_audio_narration_request_created` -> Cloud Run `mergeVideoAudioNarration` `/merge` -> RequestDoc `output`。
    messages:
      created:
        $ref: '#/components/messages/VideoRequestCreated'
      updated:
        $ref: '#/components/messages/RequestDocUpdated'
    x-haiff:
      trigger: backend/app/triggers/storyvault_video_requests.py::on_merge_video_audio_narration_request_created
      processor: Firebase Function -> mergeVideoAudioNarration /merge
  concatenateSectionVideosRequests:
    address: organizations/{organizationId}/spaces/{spaceId}/requests/concatenateSectionVideosRequests/logs/{requestId}
    title: セクション動画の連結
    summary: 複数のセクション動画を 1 本の最終動画に連結します。
    description: |
      ### 何のジョブか
      生成済みセクション動画の順序、トリム設定、音声ベッドを反映して最終動画を出力します。

      ### 処理チェーン
      Video Studio -> RequestDoc -> `on_concatenate_section_videos_request_created` -> Cloud Run `concatenateSectionVideos` `/concatenate` -> RequestDoc `output`。
    messages:
      created:
        $ref: '#/components/messages/VideoRequestCreated'
      updated:
        $ref: '#/components/messages/RequestDocUpdated'
    x-haiff:
      trigger: backend/app/triggers/storyvault_video_requests.py::on_concatenate_section_videos_request_created
      processor: Firebase Function -> concatenateSectionVideos /concatenate
  addVideoSubtitleRequests:
    address: organizations/{organizationId}/spaces/{spaceId}/requests/addVideoSubtitleRequests/logs/{requestId}
    title: 字幕焼き込み
    summary: ナレーション文から SRT/ASS を生成し、動画に字幕を焼き込みます。
    description: |
      ### 何のジョブか
      字幕プリセット、字幕サイズ、captionSegments を使い、最終動画に字幕を焼き込みます。

      ### 作成元
      `app/components/AgentWorkspace/VideoStudioWorkspace.vue::requestSubtitleGeneration`

      ### 処理チェーン
      Video Studio -> RequestDoc -> `on_add_video_subtitle_request_created` -> Cloud Run `addVideoSubtitle` `/add-subtitles` -> RequestDoc `output.subtitledVideo` / `output.srt` / `output.ass`。
    messages:
      created:
        $ref: '#/components/messages/VideoRequestCreated'
      updated:
        $ref: '#/components/messages/RequestDocUpdated'
    x-haiff:
      trigger: backend/app/triggers/storyvault_video_requests.py::on_add_video_subtitle_request_created
      processor: Firebase Function -> addVideoSubtitle /add-subtitles
  trimSilenceVideoRequests:
    address: organizations/{organizationId}/spaces/{spaceId}/requests/trimSilenceVideoRequests/logs/{requestId}
    title: 無音カット動画生成
    summary: 動画内の無音区間を検出し、字幕生成前の最終動画を再構成します。
    description: |
      ### 何のジョブか
      `settings.thresholdDb`、`settings.minSilenceMs`、`settings.keepPaddingMs` などをもとに無音区間をカットし、manifest と動画を GCS に保存します。

      ### 作成元
      `app/components/AgentWorkspace/VideoStudioWorkspace.vue::requestSilenceCut`

      ### 処理チェーン
      Video Studio -> RequestDoc -> `on_trim_silence_video_request_created` -> Cloud Run `trimSilenceVideo` `/trim-silence` -> RequestDoc `output.trimmedVideo` / `output.manifest` / `output.statistics`。
    messages:
      created:
        $ref: '#/components/messages/VideoRequestCreated'
      updated:
        $ref: '#/components/messages/RequestDocUpdated'
    x-haiff:
      trigger: backend/app/triggers/storyvault_video_requests.py::on_trim_silence_video_request_created
      processor: Firebase Function -> trimSilenceVideo /trim-silence
  googleDriveSyncRequests:
    address: organizations/{organizationId}/spaces/{spaceId}/requests/googleDriveSyncRequests/logs/{requestId}
    title: Google Drive 同期
    summary: Google Drive フォルダを GCS mirror と FileSpace に同期します。
    description: |
      ### 何のジョブか
      Drive ファイルの import/remove 差分を GCS artifact に退避し、`gdrive-sync` Workflow で mirror と FileSpace 登録を実行します。

      ### 作成元
      `app/stores/googleDriveSync.ts`、`app/composables/useGoogleDriveSyncRequestSnapshot.ts`、Web クロール完了後の backend 発行。

      ### 処理チェーン
      RequestDoc -> `backend/app/triggers/google_drive_sync.py::google_drive_sync_request_handler` -> Cloud Run `googleDriveWorkflowKicker` `/kick` -> GCP Workflows `gdrive-sync` -> RequestDoc writeback。

      ### UI が見る主な writeback
      `input.inputArtifactUri`、`progress`、`steps`、`stepLogs`、`fileItems`、`workflow.executionName`、`workflow.consoleUrl`、`workflow.state`。
    messages:
      created:
        $ref: '#/components/messages/GoogleDriveSyncRequestCreated'
      updated:
        $ref: '#/components/messages/RequestDocUpdated'
    x-haiff:
      trigger: backend/app/triggers/google_drive_sync.py::google_drive_sync_request_handler
      processor: Firebase Function -> googleDriveWorkflowKicker /kick -> gdrive-sync Workflow
  webCrawlRequests:
    address: organizations/{organizationId}/requests/webCrawlRequests/logs/{requestId}
    title: Web ページ取り込み
    summary: URL をクロールして Markdown/画像を保存し、FileSpace に登録します。
    description: |
      ### 何のジョブか
      指定 URL からページと画像を収集し、GCS 保存後に FileSpace へ登録します。

      ### 作成元
      `app/stores/webCrawlRequest.ts`、`app/components/dataSource/WebPageIngestSetupCard.vue`、`app/pages/admin/data-source/web-folders/[folderId].vue`。

      ### 処理チェーン
      Data Source UI -> RequestDoc -> `backend/app/triggers/web_crawl_requests.py::web_crawl_request_handler` -> Cloud Run `webCrawlWorkflowKicker` `/kick` -> GCP Workflows `web-crawl` -> RequestDoc writeback。

      ### UI が見る主な writeback
      `input.inputArtifactUri`、`progress.totalPages`、`progress.processedPages`、`progress.totalImages`、`steps`、`stepLogs`、`workflow`、`output.savedFiles`、`output.images`、`output.filespaceRegisteredCount`。
    messages:
      created:
        $ref: '#/components/messages/WebCrawlRequestCreated'
      updated:
        $ref: '#/components/messages/RequestDocUpdated'
    x-haiff:
      trigger: backend/app/triggers/web_crawl_requests.py::web_crawl_request_handler
      processor: Firebase Function -> webCrawlWorkflowKicker /kick -> web-crawl Workflow
  contextStoreRequests:
    address: organizations/{organizationId}/spaces/{spaceId}/requests/contextStoreRequests/logs/{requestId}
    title: Context Store / FileSpace 操作
    summary: Agent Search/FileSpace の作成、取得、アップロード、削除、一覧取得を非同期実行します。
    description: |
      ### 何のジョブか
      FileSpace と Discovery Engine/Agent Search 関連の create/get/upload/delete/list 操作を RequestDoc 化します。

      ### 作成元
      `app/stores/geminiFileSpaceOperator.ts`、`app/composables/useDefaultFileSpace.ts`、`app/composables/useGeminiFileSpaceSnapshot.ts`。

      ### 処理チェーン
      UI/Store -> RequestDoc -> `backend/app/triggers/context_store_requests.py::on_context_store_request_created` -> Cloud Run `contextStore` -> RequestDoc `output` と FileSpace metadata 永続化。
    messages:
      created:
        $ref: '#/components/messages/ContextStoreRequestCreated'
      updated:
        $ref: '#/components/messages/RequestDocUpdated'
    x-haiff:
      trigger: backend/app/triggers/context_store_requests.py::on_context_store_request_created
      processor: Firebase Function -> contextStore Cloud Run
  transactionalEmailRequests:
    address: organizations/{organizationId}/spaces/{spaceId}/requests/transactionalEmailRequests/logs/{requestId}
    title: トランザクションメール送信
    summary: 研究完了通知などのメール送信を RequestDoc 経由で実行します。
    description: |
      ### 何のジョブか
      メール本文、宛先、テンプレート/件名を RequestDoc に記録し、send-mail worker へ送ります。

      ### 処理チェーン
      Producer -> RequestDoc -> `backend/app/triggers/transactional_email_requests.py::on_transactional_email_request_created` -> Cloud Run `send-mail` -> RequestDoc 更新。

      `adkInvokeRequests` の research 完了時には `research_completion_email.py` からこの RequestDoc が enqueue されます。
    messages:
      created:
        $ref: '#/components/messages/TransactionalEmailRequestCreated'
      updated:
        $ref: '#/components/messages/RequestDocUpdated'
    x-haiff:
      trigger: backend/app/triggers/transactional_email_requests.py::on_transactional_email_request_created
      processor: Firebase Function -> send-mail Cloud Run
  firebaseFunctionsCatalog:
    address: backend/app/triggers/*.py
    title: Firebase Functions 一覧
    summary: AsyncVault に関係する Firestore trigger / callable function のカタログです。
    description: |
      | Function | Type | 役割 | Source |
      | --- | --- | --- | --- |
      | `on_adk_invoke_request_created` | firestore.onCreate | ADK Agent を SSE で実行し RequestDoc に集約 | `backend/app/triggers/adk_invoke_requests.py` |
      | `on_auto_section_video_request_created` | firestore.onCreate | 動画自動セクション分割 worker 起動 | `backend/app/triggers/storyvault_video_requests.py` |
      | `on_split_video_request_created` | firestore.onCreate | 動画分割 worker 起動 | `backend/app/triggers/storyvault_video_requests.py` |
      | `on_video_transcription_request_created` | firestore.onCreate | 動画/音声文字起こし worker 起動 | `backend/app/triggers/storyvault_video_requests.py` |
      | `on_text_to_speech_request_created` | firestore.onCreate | TTS worker 起動 | `backend/app/triggers/storyvault_video_requests.py` |
      | `on_merge_video_audio_narration_request_created` | firestore.onCreate | 動画とナレーション音声の合成 worker 起動 | `backend/app/triggers/storyvault_video_requests.py` |
      | `on_concatenate_section_videos_request_created` | firestore.onCreate | セクション動画連結 worker 起動 | `backend/app/triggers/storyvault_video_requests.py` |
      | `on_add_video_subtitle_request_created` | firestore.onCreate | 字幕焼き込み worker 起動 | `backend/app/triggers/storyvault_video_requests.py` |
      | `on_trim_silence_video_request_created` | firestore.onCreate | 無音カット worker 起動 | `backend/app/triggers/storyvault_video_requests.py` |
      | `google_drive_sync_request_handler` | firestore.onCreate | Google Drive Workflow kicker 起動 | `backend/app/triggers/google_drive_sync.py` |
      | `web_crawl_request_handler` | firestore.onCreate | Web Crawl Workflow kicker 起動 | `backend/app/triggers/web_crawl_requests.py` |
      | `on_context_store_request_created` | firestore.onCreate | Context Store worker 起動 | `backend/app/triggers/context_store_requests.py` |
      | `on_transactional_email_request_created` | firestore.onCreate | send-mail worker 起動 | `backend/app/triggers/transactional_email_requests.py` |
      | `connect_github` / `list_github_merged_pull_requests` | https.onCall | StoryVault 関連文脈取得用 GitHub OAuth/API | `backend/app/triggers/github_oauth.py` |
      | `connect_slack` / `list_slack_messages` | https.onCall | StoryVault 関連文脈取得用 Slack OAuth/API | `backend/app/triggers/slack_oauth.py` |
    messages:
      catalog:
        $ref: '#/components/messages/FirebaseFunctionsCatalog'
