components:
  parameters:
    organizationId:
      description: Organization ID
    spaceId:
      description: Space ID
    requestId:
      description: RequestDoc ID
  messages:
    AdkInvokeRequestCreated:
      title: ADK Invoke Request 作成
      summary: ADK Agent を起動する RequestDoc が作成されました。
      payload:
        $ref: '#/components/schemas/AdkInvokeRequest'
      examples:
        - name: storyvault_related_context
          payload:
            status: pending
            input:
              mode: storyvault_related_context
              sessionId: sv-session-1
              organizationId: org_123
              spaceId: space_123
              userId: user_123
              prompt: 関連する PR、Slack、Jira Issue と社内ナレッジを探してください
              responseId: response_123
              modeState:
                storyvault:
                  applicationId: app_123
                  operationVideoId: video_123
            operationMetadata:
              loggingCollectionId: requests/adkInvokeRequests/logs
              loggingDocumentId: req_123
    VideoRequestCreated:
      title: StoryVault Video Request 作成
      summary: StoryVault 動画 worker を起動する RequestDoc が作成されました。
      payload:
        $ref: '#/components/schemas/VideoRequest'
      examples:
        - name: addVideoSubtitleRequests
          payload:
            status: pending
            input:
              videoBucketName: storyvault-assets
              videoFilePath: videos/final.mp4
              outputBucketName: storyvault-assets
              outputFilePath: videos/subtitles/final_subtitled.mp4
              captionSegments:
                - startMs: 0
                  endMs: 3500
                  text: 最初のナレーション
              preset: readable
            operationMetadata:
              loggingCollectionId: requests/addVideoSubtitleRequests/logs
    GoogleDriveSyncRequestCreated:
      title: Google Drive Sync Request 作成
      summary: gdrive-sync Workflow を起動する RequestDoc が作成されました。
      payload:
        $ref: '#/components/schemas/GoogleDriveSyncRequest'
    WebCrawlRequestCreated:
      title: Web Crawl Request 作成
      summary: web-crawl Workflow を起動する RequestDoc が作成されました。
      payload:
        $ref: '#/components/schemas/WebCrawlRequest'
    ContextStoreRequestCreated:
      title: Context Store Request 作成
      summary: Context Store Cloud Run を起動する RequestDoc が作成されました。
      payload:
        $ref: '#/components/schemas/GenericRequestDoc'
    TransactionalEmailRequestCreated:
      title: Transactional Email Request 作成
      summary: メール送信 worker を起動する RequestDoc が作成されました。
      payload:
        $ref: '#/components/schemas/GenericRequestDoc'
    StoryVaultClipPipelineRequestCreated:
      title: StoryVault Clip Pipeline Request 作成
      summary: 録画素材のバックグラウンド解析Workflowを起動するRequestDocが作成されました。
      payload:
        $ref: '#/components/schemas/StoryVaultClipPipelineRequest'
    StoryVaultClipPipelineCommandCreated:
      title: StoryVault Clip Pipeline Command 作成
      summary: 失敗したクリップまたはステップの再実行コマンドが作成されました。
      payload:
        $ref: '#/components/schemas/StoryVaultClipPipelineCommand'
    RequestDocUpdated:
      title: RequestDoc 更新
      summary: worker / Workflow / trigger が進捗や結果を書き戻しました。
      payload:
        $ref: '#/components/schemas/RequestDocUpdate'
    FirebaseFunctionsCatalog:
      title: Firebase Functions カタログ
      summary: AsyncVault 関連 Functions の説明用メッセージです。
      payload:
        type: object
        additionalProperties: true
  schemas:
    RequestStatus:
      type: string
      enum:
        - pending
        - processing
        - completed
        - error
    RequestLogEntry:
      type: object
      properties:
        timestamp:
          oneOf:
            - type: string
            - type: object
        message:
          type: string
        type:
          type: string
          enum:
            - info
            - warn
            - warning
            - error
    OperationMetadata:
      type: object
      additionalProperties: true
      properties:
        loggingCollectionId:
          type: string
        loggingDocumentId:
          type: string
        requestedBy:
          type: object
          additionalProperties: true
        organizationId:
          type: string
        spaceId:
          type: string
    GenericRequestDoc:
      type: object
      required:
        - input
        - operationMetadata
        - status
      properties:
        input:
          type: object
          additionalProperties: true
        operationMetadata:
          $ref: '#/components/schemas/OperationMetadata'
        status:
          $ref: '#/components/schemas/RequestStatus'
        logs:
          type: array
          items:
            $ref: '#/components/schemas/RequestLogEntry'
        output:
          type: object
          additionalProperties: true
        errorMessage:
          type: string
      additionalProperties: true
    AdkInvokeRequest:
      allOf:
        - $ref: '#/components/schemas/GenericRequestDoc'
        - type: object
          properties:
            input:
              type: object
              required:
                - mode
                - sessionId
                - organizationId
                - spaceId
                - userId
                - prompt
                - responseId
              properties:
                mode:
                  type: string
                  enum:
                    - guide
                    - writing
                    - sheet
                    - image
                    - consultation
                    - research
                    - data_analysis
                    - web_page
                    - application_scan
                    - business_partner
                    - storyvault_related_context
                    - storyvault_zapping_analysis
                    - storyvault_capability_structuring
                    - storyvault_story_generation
                sessionId:
                  type: string
                organizationId:
                  type: string
                spaceId:
                  type: string
                userId:
                  type: string
                prompt:
                  type: string
                responseId:
                  type: string
                model:
                  type: string
                modeState:
                  type: object
                  additionalProperties: true
                attachments:
                  type: array
                  items:
                    type: object
                    additionalProperties: true
                selectedKnowledge:
                  type: array
                  items:
                    type: object
                    additionalProperties: true
                referenceImages:
                  type: array
                  items:
                    type: object
                    additionalProperties: true
            output:
              type: object
              properties:
                responseTextLength:
                  type: number
                artifactCount:
                  type: number
                sourceReferenceCount:
                  type: number
                sessionId:
                  type: string
                storyvault_related_context:
                  type: object
                  properties:
                    jira:
                      $ref: '#/components/schemas/JiraRelatedContext'
                  additionalProperties: true
                storyvault_zapping_analysis:
                  type: object
                  additionalProperties: true
              additionalProperties: true
            microServicePayload:
              type: object
              additionalProperties: true
    VideoRequest:
      allOf:
        - $ref: '#/components/schemas/GenericRequestDoc'
        - type: object
          properties:
            input:
              type: object
              additionalProperties: true
              properties:
                sourceBucketName:
                  type: string
                sourceFilePath:
                  type: string
                videoBucketName:
                  type: string
                videoFilePath:
                  type: string
                outputBucketName:
                  type: string
                outputFilePath:
                  type: string
                projectId:
                  type: string
                videoId:
                  type: string
                captionSegments:
                  type: array
                  items:
                    type: object
                    additionalProperties: true
                settings:
                  $ref: '#/components/schemas/VideoTrimSettings'
                splitPointsSeconds:
                  type: array
                  items:
                    type: number
                    minimum: 0
                segmentOutputFilePaths:
                  type: array
                  items:
                    type: string
            output:
              type: object
              properties:
                segments:
                  type: array
                  items:
                    $ref: '#/components/schemas/TrimmedVideoSegment'
              additionalProperties: true
    VideoTrimSettings:
      type: object
      properties:
        enabled:
          type: boolean
          default: true
        noiseReductionEnabled:
          type: boolean
          default: false
        noiseReductionStrengthDb:
          type: number
          minimum: 0
          maximum: 30
          default: 12
        noiseFloorDb:
          type: number
          minimum: -80
          maximum: -20
          default: -40
        thresholdDb:
          type: number
        minSilenceMs:
          type: integer
          minimum: 100
          default: 5000
        keepPaddingMs:
          type: integer
          minimum: 0
        minSegmentMs:
          type: integer
          minimum: 100
        cutRangesSeconds:
          type: array
          nullable: true
          items:
            type: object
            required:
              - start
              - end
            properties:
              start:
                type: number
                minimum: 0
              end:
                type: number
                exclusiveMinimum: 0
      additionalProperties: true
    TrimmedVideoSegment:
      type: object
      required:
        - segmentNumber
        - resultBucketName
        - resultFilePath
        - startTimeSeconds
        - endTimeSeconds
        - durationSeconds
      properties:
        segmentNumber:
          type: integer
          minimum: 1
        resultBucketName:
          type: string
        resultFilePath:
          type: string
        startTimeSeconds:
          type: number
          minimum: 0
        endTimeSeconds:
          type: number
          minimum: 0
        durationSeconds:
          type: number
          minimum: 0
    JiraRelatedContext:
      type: object
      properties:
        cloudId:
          type: string
        siteName:
          type: string
        siteUrl:
          type: string
        checkedAt:
          type: string
        issues:
          type: array
          items:
            type: object
            required:
              - key
              - summary
            properties:
              key:
                type: string
              summary:
                type: string
              description:
                type: string
              htmlUrl:
                type: string
              relevanceScore:
                type: number
                minimum: 0
                maximum: 100
              reason:
                type: string
              matchedSignals:
                type: array
                items:
                  type: string
            additionalProperties: true
        errorMessage:
          type: string
      additionalProperties: true
    StoryVaultClipPipelineRequest:
      allOf:
        - $ref: '#/components/schemas/GenericRequestDoc'
        - type: object
          properties:
            applicationId:
              type: string
            clipGroupId:
              type: string
            currentStep:
              type: string
              enum:
                - upload
                - trimSilence
                - transcribe
                - section
                - split
                - registerClips
                - quickScan
                - zappingAnalysis
                - capabilityStructuring
                - storyGeneration
                - verifyUiAssets
                - notification
            progress:
              type: number
              minimum: 0
              maximum: 100
            steps:
              type: object
              additionalProperties:
                type: object
                additionalProperties: true
            clips:
              type: array
              items:
                type: object
                additionalProperties: true
            counters:
              type: object
              additionalProperties: true
            workflow:
              type: object
              additionalProperties: true
            latestLogs:
              type: array
              items:
                type: object
                additionalProperties: true
            input:
              type: object
              required:
                - sourceGcsUri
                - sourceContentType
                - durationMs
              properties:
                sourceGcsUri:
                  type: string
                sourceContentType:
                  type: string
                durationMs:
                  type: number
                  minimum: 0
                notificationEmail:
                  type: string
                autoAcceptSections:
                  type: boolean
                silenceMergeGapMs:
                  type: integer
                  minimum: 0
              additionalProperties: true
          additionalProperties: true
    StoryVaultClipPipelineCommand:
      type: object
      required:
        - type
        - status
      properties:
        type:
          type: string
          enum:
            - retry_clip
            - resume_step
        clipId:
          type: string
          nullable: true
        step:
          type: string
          nullable: true
        status:
          type: string
          enum:
            - pending
            - accepted
            - error
      additionalProperties: true
    GoogleDriveSyncRequest:
      allOf:
        - $ref: '#/components/schemas/GenericRequestDoc'
        - type: object
          properties:
            input:
              type: object
              properties:
                operationType:
                  type: string
                  enum:
                    - syncFolder
                    - syncSingleFolder
                connectionId:
                  type: string
                rootFolderId:
                  type: string
                rootFolderResourceKey:
                  type: string
                  nullable: true
                targetFolderId:
                  type: string
                  nullable: true
                fileSpaceId:
                  type: string
                inputArtifactUri:
                  type: string
                  nullable: true
                importCount:
                  type: number
                removeCount:
                  type: number
              additionalProperties: true
            workflow:
              type: object
              additionalProperties: true
            progress:
              type: object
              additionalProperties: true
            steps:
              type: object
              additionalProperties: true
            stepLogs:
              type: object
              additionalProperties: true
            fileItems:
              type: object
              additionalProperties: true
    WebCrawlRequest:
      allOf:
        - $ref: '#/components/schemas/GenericRequestDoc'
        - type: object
          properties:
            input:
              type: object
              properties:
                url:
                  type: string
                  format: uri
                bucketName:
                  type: string
                folderPath:
                  type: string
                maxDepth:
                  type: number
                maxUrls:
                  type: number
                fileSpaceId:
                  type: string
                includeImages:
                  type: boolean
                inputArtifactUri:
                  type: string
                  nullable: true
              additionalProperties: true
            workflow:
              type: object
              additionalProperties: true
            progress:
              type: object
              additionalProperties: true
            steps:
              type: object
              additionalProperties: true
            stepLogs:
              type: object
              additionalProperties: true
            output:
              type: object
              properties:
                totalPages:
                  type: number
                markdownCount:
                  type: number
                imageCount:
                  type: number
                filespaceRegisteredCount:
                  type: number
                savedFiles:
                  type: array
                  items:
                    type: object
                    additionalProperties: true
                images:
                  type: array
                  items:
                    type: object
                    additionalProperties: true
              additionalProperties: true
    RequestDocUpdate:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/RequestStatus'
        logs:
          type: array
          items:
            $ref: '#/components/schemas/RequestLogEntry'
        output:
          type: object
          additionalProperties: true
        progress:
          type: object
          additionalProperties: true
        steps:
          type: object
          additionalProperties: true
        stepLogs:
          type: object
          additionalProperties: true
        workflow:
          type: object
          additionalProperties: true
        errorMessage:
          type: string
      additionalProperties: true
