    - writeError:
        try:
          call: http.request
          args:
            method: PATCH
            url: ${"https://firestore.googleapis.com/v1/" + documentName + "?updateMask.fieldPaths=steps." + stepId + "&updateMask.fieldPaths=status&updateMask.fieldPaths=workflow.state&updateMask.fieldPaths=workflow.endedAt&updateMask.fieldPaths=errorMessage&updateMask.fieldPaths=updatedAt"}
