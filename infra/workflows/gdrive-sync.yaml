# Patch one entry of the steps map. Builds an updateMask `steps.{stepId}` and
# a body where the `steps` map contains a single key (static switch on stepId).
PatchStep:
  params: [documentName, stepId, status, currentStep, currentStage, detail]
  steps:
    - prep:
        assign:
          - nowStr: ${time.format(sys.now())}
          - stepFields:
              id:
                stringValue: ${stepId}
              status:
                stringValue: ${status}
              endedAt:
                timestampValue: ${nowStr}
    - mergeStartedAt:
        switch:
          - condition: ${status == "running"}
            assign:
              - startedExtra:
                  startedAt:
                    timestampValue: ${nowStr}
              - stepFields: ${map.merge(stepFields, startedExtra)}
    - mergeDetail:
        switch:
          - condition: ${default(detail, null) != null}
            assign:
              - detailExtra:
                  detail:
                    stringValue: ${json.encode_to_string(detail)}
              - stepFields: ${map.merge(stepFields, detailExtra)}
    - buildStepsMap:
        switch:
          - condition: ${stepId == "loadInput"}
            assign:
              - stepsMap:
                  loadInput:
                    mapValue:
                      fields: ${stepFields}
          - condition: ${stepId == "listDriveFolder"}
            assign:
              - stepsMap:
                  listDriveFolder:
                    mapValue:
                      fields: ${stepFields}
          - condition: ${stepId == "diffWithMirror"}
            assign:
              - stepsMap:
                  diffWithMirror:
                    mapValue:
                      fields: ${stepFields}
          - condition: ${stepId == "mirrorAdd"}
            assign:
              - stepsMap:
                  mirrorAdd:
                    mapValue:
                      fields: ${stepFields}
          - condition: ${stepId == "mirrorRemove"}
            assign:
              - stepsMap:
                  mirrorRemove:
                    mapValue:
                      fields: ${stepFields}
          - condition: ${stepId == "diffWithFileSpace"}
            assign:
              - stepsMap:
                  diffWithFileSpace:
                    mapValue:
                      fields: ${stepFields}
          - condition: ${stepId == "registerAdd"}
            assign:
              - stepsMap:
                  registerAdd:
                    mapValue:
                      fields: ${stepFields}
          - condition: ${stepId == "registerRemove"}
            assign:
              - stepsMap:
                  registerRemove:
                    mapValue:
                      fields: ${stepFields}
          - condition: ${stepId == "finalize"}
            assign:
              - stepsMap:
                  finalize:
                    mapValue:
                      fields: ${stepFields}
          - condition: true
            assign:
              - stepsMap: ${json.decode("{}")}
    - buildBody:
        assign:
          - progressFields:
              currentStep:
                stringValue: ${default(currentStep, "")}
              currentStage:
                stringValue: ${default(currentStage, "")}
          - body:
              fields:
                steps:
                  mapValue:
                    fields: ${stepsMap}
                progress:
                  mapValue:
                    fields: ${progressFields}
                updatedAt:
                  timestampValue: ${nowStr}
          - updateMask: ${"updateMask.fieldPaths=steps." + stepId + "&updateMask.fieldPaths=progress.currentStep&updateMask.fieldPaths=progress.currentStage&updateMask.fieldPaths=updatedAt"}
    - sendPatch:
        try:
          call: http.request
          args:
            method: PATCH
            url: ${"https://firestore.googleapis.com/v1/" + documentName + "?" + updateMask}
            auth:
              type: OAuth2
            body: ${body}
        except:
          as: e
          steps:
            - logPatchErr:
                call: sys.log
                args:
                  text: '${"PatchStep " + stepId + " failed: " + json.encode_to_string(e)}'

# Append one log line to stepLogs.{stepId} (JSON stringValue array).
AppendStepLog:
  params: [documentName, stepId, level, message, priorLogsJson]
  steps:
    - fetchExisting:
        try:
          call: http.get
          args:
            url: ${"https://firestore.googleapis.com/v1/" + documentName + "?mask.fieldPaths=stepLogs." + stepId}
            auth:
              type: OAuth2
          result: currentDoc
        except:
          as: e
          steps:
            - fallbackExisting:
                assign:
                  - currentDoc:
                      body:
                        fields: {}
    - merge:
        assign:
          - nowStr: ${time.format(sys.now())}
          - docFields: ${default(map.get(default(currentDoc.body, json.decode("{}")), "fields"), json.decode("{}"))}
          - stepLogsField: ${default(map.get(docFields, "stepLogs"), json.decode("{}"))}
          - stepLogsMapValue: ${default(map.get(stepLogsField, "mapValue"), json.decode("{}"))}
          - stepLogsFields: ${default(map.get(stepLogsMapValue, "fields"), json.decode("{}"))}
          - currentStepLogField: ${default(map.get(stepLogsFields, stepId), json.decode("{}"))}
          - existingLogsJson: ${default(map.get(currentStepLogField, "stringValue"), default(priorLogsJson, "[]"))}
          - prior: ${json.decode(existingLogsJson)}
          - entry:
              at: ${nowStr}
              level: ${level}
              message: ${message}
              stepId: ${stepId}
          - merged: ${list.concat(prior, entry)}
          - encoded: ${json.encode_to_string(merged)}
    - buildStepLogsMap:
        switch:
          - condition: ${stepId == "loadInput"}
            assign:
              - stepLogsMap:
                  loadInput:
                    stringValue: ${encoded}
          - condition: ${stepId == "listDriveFolder"}
            assign:
              - stepLogsMap:
                  listDriveFolder:
                    stringValue: ${encoded}
          - condition: ${stepId == "diffWithMirror"}
            assign:
              - stepLogsMap:
                  diffWithMirror:
                    stringValue: ${encoded}
          - condition: ${stepId == "mirrorAdd"}
            assign:
              - stepLogsMap:
                  mirrorAdd:
                    stringValue: ${encoded}
          - condition: ${stepId == "mirrorRemove"}
            assign:
              - stepLogsMap:
                  mirrorRemove:
                    stringValue: ${encoded}
          - condition: ${stepId == "diffWithFileSpace"}
            assign:
              - stepLogsMap:
                  diffWithFileSpace:
                    stringValue: ${encoded}
          - condition: ${stepId == "registerAdd"}
            assign:
              - stepLogsMap:
                  registerAdd:
                    stringValue: ${encoded}
          - condition: ${stepId == "registerRemove"}
            assign:
              - stepLogsMap:
                  registerRemove:
                    stringValue: ${encoded}
          - condition: ${stepId == "finalize"}
            assign:
              - stepLogsMap:
                  finalize:
                    stringValue: ${encoded}
          - condition: true
            assign:
              - stepLogsMap: ${json.decode("{}")}
    - patch:
        try:
          call: http.request
          args:
            method: PATCH
            url: ${"https://firestore.googleapis.com/v1/" + documentName + "?updateMask.fieldPaths=stepLogs." + stepId + "&updateMask.fieldPaths=updatedAt"}
            auth:
              type: OAuth2
            body:
              fields:
                stepLogs:
                  mapValue:
                    fields: ${stepLogsMap}
                updatedAt:
                  timestampValue: ${nowStr}
        except:
          as: e
          steps:
            - logAppendErr:
                call: sys.log
                args:
                  text: '${"AppendStepLog " + stepId + " failed: " + json.encode_to_string(e)}'

