        except:
          as: e
          steps:
            - logFailErr:
                call: sys.log
                args:
                  text: '${"FailWorkflow writeback failed: " + json.encode_to_string(e)}'
    - raise:
        raise: '${"step " + stepId + " failed: " + errStr}'


# Merge two lists without nesting the right list as a single element.
# list.concat(left, right) would append the entire `right` list as one item.
MergeLists:
  params: [left, right]
  steps:
    - init:
        assign:
          - merged: ${default(left, [])}
          - i: 0
          - rightLen: ${len(default(right, []))}
    - loop:
        steps:
          - checkDone:
              switch:
                - condition: ${i >= rightLen}
                  next: returnMerged
          - append:
              assign:
                - merged: ${list.concat(merged, right[i])}
                - i: ${i + 1}
              next: loop
    - returnMerged:
        return: ${merged}


# Chunk `items` into batches of `chunkSize`, POST each to `url` with `bodyExtras`
# merged in, sum integer fields across responses.
# Optional `documentName` + `fileItemStage` enable per-file PATCH after each chunk.
ChunkAndApply:
  params: [items, url, authAudience, chunkSize, bodyExtras, documentName, fileItemStage, completeOnSuccess]
  steps:
    - prep:
        assign:
          - total: ${len(items)}
          - chunks: 0
          - okBatches: 0
          - errBatches: 0
          - addedSum: 0
          - updatedSum: 0
          - removedSum: 0
          - failedSum: 0
          - i: 0
          - patchFileItems: ${default(documentName, "") != "" and default(fileItemStage, "") != ""}
    - loop:
        steps:
          - checkDone:
              switch:
                - condition: ${i >= total}
                  next: returnRes
          - takeChunk:
              assign:
                - endIdx: ${if(i + chunkSize > total, total, i + chunkSize)}
                - chunk: []
                - idx: ${i}
                - chunks: ${chunks + 1}
          - collectChunk:
              switch:
                - condition: ${idx >= endIdx}
                  next: buildBody
          - appendOne:
              assign:
                - chunk: ${list.concat(chunk, items[idx])}
                - idx: ${idx + 1}
              next: collectChunk
          - buildBody:
              assign:
                - chunkExtras:
                    items: ${chunk}
                - body: ${map.merge(bodyExtras, chunkExtras)}
                - chunkResp: null
                - chunkOk: false
          - sendChunk:
              try:
                call: http.post
                args:
                  url: ${url}
                  auth:
                    type: OIDC
                    audience: ${authAudience}
                  timeout: 1800
                  body: ${body}
                result: chunkResp
              except:
                as: e
                steps:
                  - markBatchErr:
                      assign:
                        - errBatches: ${errBatches + 1}
                        - failedSum: ${failedSum + len(chunk)}
                        - chunkResp: null
                  - patchChunkErr:
                      switch:
                        - condition: ${patchFileItems}
                          call: PatchFileItemsChunkFailed
                          args:
                            documentName: ${documentName}
                            chunk: ${chunk}
                            stageField: ${fileItemStage}
                            errorMessage: "batch request failed"
                  - logBatchErr:
                      call: sys.log
                      args:
                        text: '${"ChunkAndApply chunk failed: " + json.encode_to_string(e)}'
                  - failChunk:
                      raise: '${"ChunkAndApply chunk failed: " + json.encode_to_string(e)}'
          - markChunkResult:
              switch:
                - condition: ${chunkResp != null}
                  steps:
                    - setChunkOk:
                        assign:
                          - chunkOk: true
          - patchChunkSuccess:
              switch:
                - condition: ${chunkOk and patchFileItems}
                  call: PatchFileItemsFromApplyBatchResponse
                  args:
                    documentName: ${documentName}
                    responseBody: ${chunkResp.body}
                    stageField: ${fileItemStage}
                    completeOnSuccess: ${default(completeOnSuccess, false)}
          - aggregate:
              switch:
                - condition: ${chunkOk}
                  steps:
                    - aggOk:
                        assign:
                          - okBatches: ${okBatches + 1}
                          - addedSum: ${addedSum + default(map.get(chunkResp.body, "added"), 0)}
                          - updatedSum: ${updatedSum + default(map.get(chunkResp.body, "updated"), 0)}
                          - removedSum: ${removedSum + default(map.get(chunkResp.body, "removed"), 0)}
                          - failedSum: ${failedSum + default(map.get(chunkResp.body, "failed"), 0)}
          - advance:
              assign:
                - i: ${endIdx}
              next: loop
    - returnRes:
        return:
          added: ${addedSum}
          updated: ${updatedSum}
          removed: ${removedSum}
          failed: ${failedSum}
          batches: ${chunks}
          okBatches: ${okBatches}
          errBatches: ${errBatches}


# Patch one fileItems.{driveFileId}.{stageField} (+ optional errorMessage).
PatchFileItemStage:
  params: [documentName, driveFileId, stageField, statusValue, errorMessage]
  steps:
    - assignNow:
        assign:
          - nowStr: ${time.format(sys.now())}
          - errMsg: ${default(errorMessage, "")}
    - buildInnerFields:
        assign:
          - innerFields:
              ${stageField}:
                stringValue: ${statusValue}
    - putError:
        switch:
          - condition: ${errMsg != ""}
            assign:
              - innerFields["errorMessage"]:
                  stringValue: ${text.replace_all(errMsg, "\"", "'")}
    - buildFileItemsMap:
        assign:
          - fileItemStagePath: ${"fileItems.`" + driveFileId + "`." + stageField}
          - fileItemErrorPath: ${"fileItems.`" + driveFileId + "`.errorMessage"}
          - encodedFileItemStagePath: ${text.url_encode(fileItemStagePath)}
          - encodedFileItemErrorPath: ${text.url_encode(fileItemErrorPath)}
          - fileItemsOuter:
              mapValue:
                fields:
                  ${driveFileId}:
                    mapValue:
                      fields: ${innerFields}
          - updateMask: ${"updateMask.fieldPaths=" + encodedFileItemStagePath + "&updateMask.fieldPaths=updatedAt" + if(errMsg != "", "&updateMask.fieldPaths=" + encodedFileItemErrorPath, "")}
    - patch:
        try:
          call: http.request
          args:
            method: PATCH
            url: ${"https://firestore.googleapis.com/v1/" + documentName + "?" + updateMask}
            auth:
              type: OAuth2
            body:
              fields:
                fileItems: ${fileItemsOuter}
                updatedAt:
                  timestampValue: ${nowStr}
        except:
          as: e
          steps:
            - logFileItemErr:
                call: sys.log
                args:
                  text: '${"PatchFileItemStage failed: " + json.encode_to_string(e)}'


PatchFileItemsFromIds:
  params: [documentName, fileIds, stageField, statusValue]
  steps:
    - init:
        assign:
          - i: 0
          - total: ${len(default(fileIds, []))}
    - loop:
        steps:
          - checkDone:
              switch:
                - condition: ${i >= total}
                  next: returnDone
          - patchOne:
              call: PatchFileItemStage
              args:
                documentName: ${documentName}
                driveFileId: ${fileIds[i]}
                stageField: ${stageField}
                statusValue: ${statusValue}
                errorMessage: ""
          - inc:
              assign:
                - i: ${i + 1}
              next: loop
    - returnDone:
        return: null


PatchFileItemsFromWorkItems:
  params: [documentName, items, stageField, statusValue]
  steps:
    - init:
        assign:
          - i: 0
          - total: ${len(default(items, []))}
    - loop:
        steps:
          - checkDone:
              switch:
                - condition: ${i >= total}
                  next: returnDone
          - readItem:
              assign:
                - row: ${items[i]}
                - driveFileId: ${default(map.get(row, "driveFileId"), "")}
                - i: ${i + 1}
          - patchOne:
              switch:
                - condition: ${driveFileId != ""}
                  call: PatchFileItemStage
                  args:
                    documentName: ${documentName}
                    driveFileId: ${driveFileId}
                    stageField: ${stageField}
                    statusValue: ${statusValue}
                    errorMessage: ""
              next: loop
    - returnDone:
        return: null


PatchFileItemsChunkFailed:
  params: [documentName, chunk, stageField, errorMessage]
  steps:
    - init:
        assign:
          - i: 0
          - total: ${len(default(chunk, []))}
    - loop:
        steps:
          - checkDone:
              switch:
                - condition: ${i >= total}
                  next: returnDone
          - readItem:
              assign:
                - row: ${chunk[i]}
                - driveFileId: ${default(map.get(row, "driveFileId"), "")}
                - i: ${i + 1}
          - patchOne:
              switch:
                - condition: ${driveFileId != ""}
                  call: PatchFileItemStage
                  args:
                    documentName: ${documentName}
                    driveFileId: ${driveFileId}
                    stageField: ${stageField}
                    statusValue: "error"
                    errorMessage: ${errorMessage}
              next: loop
    - returnDone:
        return: null


PatchFileItemsFromApplyBatchResponse:
  params: [documentName, responseBody, stageField, completeOnSuccess]
  steps:
    - init:
        assign:
          - results: ${default(map.get(responseBody, "results"), [])}
          - failures: ${default(map.get(responseBody, "failures"), [])}
          - ri: 0
          - fi: 0
    - loopResults:
        steps:
          - checkResults:
              switch:
                - condition: ${ri >= len(results)}
                  next: initFailures
          - readResult:
              assign:
                - row: ${results[ri]}
                - driveFileId: ${default(map.get(row, "driveFileId"), "")}
                - ok: ${default(map.get(row, "ok"), false)}
                - errText: ${default(map.get(row, "error"), "batch item failed")}
                - ri: ${ri + 1}
          - patchResult:
              switch:
                - condition: ${driveFileId != "" and ok}
                  steps:
                    - patchOk:
                        call: PatchFileItemStage
                        args:
                          documentName: ${documentName}
                          driveFileId: ${driveFileId}
                          stageField: ${stageField}
                          statusValue: "completed"
                          errorMessage: ""
                    - patchCompleteIfNeeded:
                        switch:
                          - condition: ${default(completeOnSuccess, false)}
                            call: PatchFileItemStage
                            args:
                              documentName: ${documentName}
                              driveFileId: ${driveFileId}
                              stageField: "complete"
                              statusValue: "completed"
                              errorMessage: ""
                - condition: ${driveFileId != ""}
                  call: PatchFileItemStage
                  args:
                    documentName: ${documentName}
                    driveFileId: ${driveFileId}
                    stageField: ${stageField}
                    statusValue: "error"
                    errorMessage: ${errText}
              next: loopResults
    - initFailures:
        assign:
          - fi: 0
    - loopFailures:
        steps:
          - checkFailures:
              switch:
                - condition: ${fi >= len(failures)}
                  next: returnDone
          - readFailure:
              assign:
                - row: ${failures[fi]}
                - driveFileId: ${default(map.get(row, "driveFileId"), "")}
                - errText: ${default(map.get(row, "error"), "batch item failed")}
                - fi: ${fi + 1}
          - patchFailure:
              switch:
                - condition: ${driveFileId != ""}
                  call: PatchFileItemStage
                  args:
                    documentName: ${documentName}
                    driveFileId: ${driveFileId}
                    stageField: ${stageField}
                    statusValue: "error"
                    errorMessage: ${errText}
              next: loopFailures
    - returnDone:
        return: null
